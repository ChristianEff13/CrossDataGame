<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coding Crossy Road - Pro Pixel Elephant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #05070a;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #0d1117;
            touch-action: none;
        }
        #ui-overlay {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #e6edf3;
            pointer-events: none;
            z-index: 10;
        }
        .stats-box {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #2cf1da;
            box-shadow: 0 0 20px rgba(44, 241, 218, 0.2);
        }
        .controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .btn {
            width: 75px;
            height: 75px;
            background: rgba(22, 27, 34, 0.9);
            border: 2px solid #30363d;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2cf1da;
            font-size: 28px;
            pointer-events: auto;
            user-select: none;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #0d1117;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0d1117;
            background: #2cf1da;
            color: #0d1117;
        }
        .btn-fire {
            background: rgba(248, 81, 73, 0.15);
            border-color: #f85149;
            color: #f85149;
            height: 160px;
        }
        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0d1117;
            border: 3px solid #f85149;
            padding: 40px;
            text-align: center;
            color: white;
            border-radius: 20px;
            display: none;
            z-index: 100;
            box-shadow: 0 0 100px rgba(248, 81, 73, 0.3);
        }
        #message-box button {
            margin-top: 25px;
            padding: 15px 40px;
            background: #238636;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="stats-box">
            <div class="text-[10px] uppercase tracking-[0.2em] text-teal-400 mb-1">Integritas Sistem</div>
            <div class="text-4xl font-mono font-black italic"><span id="score">0</span><span class="text-sm ml-1 text-teal-500 opacity-50">.LOC</span></div>
            <div id="shield-ui" class="hidden mt-2 text-xs font-bold text-green-400">SHIELD_PROTOCOL: AKTIF</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls md:hidden">
        <div class="flex flex-col items-center gap-2">
            <div id="btn-up" class="btn">▲</div>
            <div class="flex gap-14">
                <div id="btn-left" class="btn">◀</div>
                <div id="btn-right" class="btn">▶</div>
            </div>
            <div id="btn-down" class="btn">▼</div>
        </div>
        <div class="flex items-end">
            <div id="btn-fire" class="btn btn-fire">⚡</div>
        </div>
    </div>

    <div id="message-box">
        <div id="msg-icon" class="text-7xl mb-6">🐘</div>
        <h2 id="msg-title" class="text-4xl font-black mb-2 text-red-500">FATAL ERROR</h2>
        <p id="msg-text" class="text-gray-400 font-mono"></p>
        <button onclick="resetGame()">Inisialisasi Reboot</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const messageBox = document.getElementById('message-box');
    const shieldUi = document.getElementById('shield-ui');

    const gridSize = 64;
    let gameActive = true;
    let score = 0;
    let maxDistance = 0;
    let cameraY = 0;
    let targetCameraY = 0;
    let shakeAmount = 0;
    let gcY = 0;
    let gcSpeed = 0.15; 

    const particles = [];
    const bullets = [];
    const items = [];
    const rows = [];
    const deco = {};

    function spawnParticles(x, y, color, count = 10, speed = 6) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * speed,
                vy: (Math.random() - 0.5) * speed,
                life: 1,
                decay: 0.01 + Math.random() * 0.02,
                color,
                size: 2 + Math.random() * 4
            });
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const player = {
        gridX: 0,
        gridY: 0,
        pixelX: 0,
        pixelY: 0,
        targetX: 0,
        targetY: 0,
        isMoving: false,
        direction: 'up',
        jumpAnim: 0,
        hasShield: false,
        frame: 0,
        trunkAnim: 0, // Animasi belalai memanjang saat menembak
        
        init() {
            this.gridX = Math.floor(canvas.width / 2 / gridSize);
            this.gridY = Math.floor(canvas.height / gridSize) - 2;
            this.targetX = this.gridX * gridSize;
            this.targetY = this.gridY * gridSize;
            this.pixelX = this.targetX;
            this.pixelY = this.targetY;
            this.hasShield = false;
            this.trunkAnim = 0;
            shieldUi.classList.add('hidden');
            gcY = (this.gridY + 15) * gridSize; 
        },

        move(dx, dy) {
            if (this.isMoving || !gameActive) return;
            
            this.gridX += dx;
            this.gridY += dy;
            this.targetX = this.gridX * gridSize;
            this.targetY = this.gridY * gridSize;
            this.isMoving = true;
            this.jumpAnim = 0;

            if (dx > 0) this.direction = 'right';
            if (dx < 0) this.direction = 'left';
            if (dy < 0) this.direction = 'up';
            if (dy > 0) this.direction = 'down';

            spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize/2, '#2cf1da', 5, 3);

            let dist = (Math.floor(canvas.height / gridSize) - 2) - this.gridY;
            if (dist > maxDistance) {
                maxDistance = dist;
                score = maxDistance * 10;
                scoreElement.innerText = score;
                gcSpeed = 0.15 + (score / 6000); 
            }
        },

        shoot() {
            if (!gameActive) return;
            this.trunkAnim = 1.0; // Trigger animasi belalai
            bullets.push({
                x: this.pixelX + gridSize/2,
                y: this.pixelY + gridSize/2,
                dir: this.direction,
                speed: 15,
                life: 60
            });
            spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize/2, '#ffffff', 10, 5);
        },

        update() {
            this.pixelX += (this.targetX - this.pixelX) * 0.22;
            this.pixelY += (this.targetY - this.pixelY) * 0.22;

            if (this.isMoving) {
                this.jumpAnim += 0.3;
                if (this.jumpAnim >= Math.PI) {
                    this.jumpAnim = 0;
                    this.isMoving = false;
                    this.pixelX = this.targetX;
                    this.pixelY = this.targetY;
                }
            }
            if (this.trunkAnim > 0) this.trunkAnim -= 0.1;
            this.frame++;
        },

        draw(camY) {
            const jumpHeight = Math.sin(this.jumpAnim) * 20;
            const drawX = this.pixelX + gridSize/2;
            const drawY = this.pixelY + gridSize/2 - camY - jumpHeight;

            ctx.save();
            ctx.translate(drawX, drawY);

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 24 + jumpHeight/2, 22 - jumpHeight/4, 8 - jumpHeight/8, 0, 0, Math.PI*2);
            ctx.fill();

            // Colors
            const tosca = '#2cf1da';
            const toscaDark = '#1ebca9';
            const toscaShadow = '#147a6e';
            const toscaLight = '#a2fff5';

            // Animasi napas & telinga
            const breath = Math.sin(this.frame * 0.12) * 2;
            const earWave = Math.sin(this.frame * 0.08) * 4;

            // Orientasi
            if (this.direction === 'left') ctx.scale(-1, 1);
            if (this.direction === 'up' || this.direction === 'down') {
                // Sedikit penyesuaian jika menghadap vertikal (opsional)
            }

            // --- KAKI BELAKANG ---
            ctx.fillStyle = toscaShadow;
            ctx.fillRect(-16, 12, 10, 16); // Kaki kiri
            ctx.fillRect(6, 12, 10, 16);  // Kaki kanan
            // Kuku kaki
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-16, 24, 4, 4); ctx.fillRect(-10, 24, 4, 4);
            ctx.fillRect(6, 24, 4, 4); ctx.fillRect(12, 24, 4, 4);

            // --- TUBUH (PIXEL STYLE) ---
            ctx.fillStyle = tosca;
            ctx.fillRect(-22, -12 + breath, 44, 30 - breath);
            // Detail bayangan sisi bawah tubuh
            ctx.fillStyle = toscaDark;
            ctx.fillRect(-22, 10 + breath, 44, 8);
            // Perut
            ctx.fillStyle = toscaLight;
            ctx.fillRect(-12, 0 + breath, 24, 18);

            // --- KEPALA ---
            ctx.fillStyle = tosca;
            ctx.fillRect(-20, -32 + breath, 40, 24);
            // Bayangan kepala
            ctx.fillStyle = toscaDark;
            ctx.fillRect(-20, -14 + breath, 40, 6);

            // --- TELINGA ---
            ctx.fillStyle = toscaDark;
            // Telinga Kanan (Belakang)
            ctx.fillRect(18 + earWave, -30 + breath, 12, 22);
            ctx.fillStyle = toscaShadow;
            ctx.fillRect(24 + earWave, -25 + breath, 4, 12);
            // Telinga Kiri (Depan)
            ctx.fillStyle = toscaDark;
            ctx.fillRect(-30 - earWave, -30 + breath, 12, 22);
            ctx.fillStyle = toscaShadow;
            ctx.fillRect(-28 - earWave, -25 + breath, 4, 12);

            // --- MATA ---
            ctx.fillStyle = '#000000';
            ctx.fillRect(6, -24 + breath, 6, 6);
            ctx.fillRect(-12, -24 + breath, 6, 6);
            // Kilau mata
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(10, -24 + breath, 2, 2);
            ctx.fillRect(-8, -24 + breath, 2, 2);

            // --- TANGAN (Kaki depan diangkat) ---
            ctx.fillStyle = tosca;
            ctx.fillRect(-28, -2 + breath, 10, 14);
            ctx.fillRect(18, -2 + breath, 10, 14);

            // --- BELALAI DINAMIS (Menuju Target) ---
            ctx.save();
            ctx.fillStyle = tosca;
            
            let trunkX = 0;
            let trunkY = -12 + breath;
            let targetAngle = 0;
            let length = 15 + (this.trunkAnim * 25); // Memanjang saat menembak

            // Tentukan sudut belalai berdasarkan arah
            if (this.direction === 'right') targetAngle = -0.2;
            if (this.direction === 'left') targetAngle = -0.2; 
            if (this.direction === 'up') targetAngle = -1.2;
            if (this.direction === 'down') targetAngle = 1.2;

            ctx.translate(trunkX, trunkY);
            ctx.rotate(targetAngle);
            
            // Gambar belalai segmen demi segmen (pixelated look)
            for(let i=0; i<4; i++) {
                ctx.fillStyle = i % 2 === 0 ? tosca : toscaDark;
                ctx.fillRect(i*4, -4, 5, 8 + (i*1));
            }
            // Ujung belalai yang memanjang
            ctx.fillStyle = tosca;
            ctx.fillRect(16, -5, length, 10);
            ctx.fillStyle = toscaDark;
            ctx.fillRect(16 + length, -6, 6, 12); // Lubang belalai

            ctx.restore();

            // Efek Shield
            if (this.hasShield) {
                ctx.strokeStyle = '#3fb950';
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 4]);
                ctx.strokeRect(-40, -45, 80, 80);
            }

            ctx.restore();
        }
    };

    function createRow(y) {
        const types = ['grass', 'road', 'road', 'river', 'grass'];
        let type = types[Math.floor(Math.random() * types.length)];
        if (y > player.gridY - 3) type = 'grass';

        const row = {
            y: y,
            type: type,
            entities: [],
            speed: (Math.random() * 2 + 1) * (Math.random() > 0.5 ? 1 : -1),
            color: type === 'grass' ? '#0d1117' : (type === 'road' ? '#161b22' : '#0d223a'),
            label: type.toUpperCase()
        };

        if (type === 'road') {
            for (let i = 0; i < 2; i++) {
                row.entities.push({ x: Math.random() * canvas.width, w: 110, h: 44, color: '#30363d', label: 'PACKET_' + Math.floor(Math.random()*999) });
            }
        } else if (type === 'river') {
            row.speed *= 0.6;
            for (let i = 0; i < 3; i++) {
                row.entities.push({ x: Math.random() * canvas.width, w: 140, h: 48, color: '#4a3728', label: 'DATA_LOG' });
            }
        } else if (type === 'grass') {
            deco[y] = [];
            for (let i = 0; i < 5; i++) {
                deco[y].push({ x: Math.random() * canvas.width, size: 8 + Math.random() * 16 });
            }
            if (y < player.gridY - 5 && Math.random() > 0.5) {
                row.entities.push({ 
                    x: Math.random() * (canvas.width - 100) + 50, 
                    isBug: true, 
                    w: 50, 
                    h: 50, 
                    pulseOffset: Math.random()*10,
                    moveSpeed: (2 + Math.random() * 2.5) * (Math.random() > 0.5 ? 1 : -1) 
                });
            }
            if (Math.random() > 0.92) {
                items.push({ gridX: Math.floor(Math.random() * (canvas.width / gridSize)), gridY: y, type: 'shield' });
            }
        }
        return row;
    }

    function handleCollision(title, text) {
        if (player.hasShield) {
            player.hasShield = false;
            shieldUi.classList.add('hidden');
            spawnParticles(player.pixelX + gridSize/2, player.pixelY + gridSize/2, '#3fb950', 40, 12);
            shakeAmount = 30;
            player.targetY += gridSize;
            player.gridY += 1;
            return;
        }
        shakeAmount = 45;
        gameActive = false;
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-text').innerText = text;
        messageBox.style.display = 'block';
    }

    function update() {
        if (!gameActive) return;

        player.update();
        targetCameraY = player.pixelY - canvas.height + gridSize * 5;
        cameraY += (targetCameraY - cameraY) * 0.1;

        if (shakeAmount > 0) shakeAmount *= 0.9;

        gcY -= gcSpeed;
        if (player.pixelY + 30 > gcY) {
            handleCollision("SYSTEM PURGE", "Gajah tertinggal oleh Garbage Collector!");
        }

        // Particle update
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // Bullet update
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            if (b.dir === 'up') b.y -= b.speed;
            if (b.dir === 'down') b.y += b.speed;
            if (b.dir === 'left') b.x -= b.speed;
            if (b.dir === 'right') b.x += b.speed;
            b.life--;

            rows.forEach(row => {
                row.entities.forEach((ent, idx) => {
                    if (ent.isBug) {
                        const ey = row.y * gridSize + (gridSize - ent.h)/2;
                        if (b.x > ent.x && b.x < ent.x + ent.w && b.y > ey && b.y < ey + ent.h) {
                            spawnParticles(ent.x + ent.w/2, ey + ent.h/2, '#ff4444', 30, 10);
                            row.entities.splice(idx, 1);
                            bullets.splice(i, 1);
                            score += 150;
                            scoreElement.innerText = score;
                        }
                    }
                });
            });
            if (b.life <= 0) bullets.splice(i, 1);
        }

        // Item update
        for (let i = items.length - 1; i >= 0; i--) {
            const itm = items[i];
            if (player.gridX === itm.gridX && player.gridY === itm.gridY) {
                player.hasShield = true;
                shieldUi.classList.remove('hidden');
                spawnParticles(player.pixelX + gridSize/2, player.pixelY + gridSize/2, '#3fb950', 25, 6);
                items.splice(i, 1);
            }
        }

        // Row/Entity logic
        rows.forEach(row => {
            row.entities.forEach(ent => {
                if (ent.isBug) {
                    ent.x += ent.moveSpeed;
                    if (ent.x + ent.w > canvas.width || ent.x < 0) ent.moveSpeed *= -1;
                } else {
                    ent.x += row.speed;
                    if (ent.x > canvas.width + 160) ent.x = -160;
                    if (ent.x < -160) ent.x = canvas.width + 160;
                }

                const px = player.pixelX + 18;
                const py = player.pixelY + 18;
                const ey = row.y * gridSize + (gridSize - ent.h)/2;

                if ((row.type === 'road' || ent.isBug) && !player.isMoving) {
                    if (px < ent.x + ent.w && px + 28 > ent.x && py < ey + ent.h && py + 28 > ey) {
                        handleCollision("DATA CORRUPTION", ent.isBug ? "Virus menginfeksi gajah!" : "Tabrakan paket data!");
                    }
                }
            });

            if (row.type === 'river' && Math.round(player.pixelY / gridSize) === row.y && !player.isMoving) {
                let onPlatform = false;
                row.entities.forEach(log => {
                    if (player.pixelX + gridSize/2 > log.x && player.pixelX + gridSize/2 < log.x + log.w) {
                        onPlatform = true;
                        player.pixelX += row.speed;
                        player.targetX = player.pixelX;
                        player.gridX = Math.round(player.pixelX / gridSize);
                    }
                });
                if (!onPlatform) handleCollision("STACK OVERFLOW", "Gajah jatuh ke lubang memori!");
            }
        });

        if (Math.floor(player.pixelY / gridSize) < rows[rows.length - 12].y) {
            rows.push(createRow(rows[rows.length - 1].y - 1));
        }
    }

    function draw() {
        ctx.save();
        if (shakeAmount > 1) {
            ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount);
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        rows.forEach(row => {
            const sy = row.y * gridSize - cameraY;
            if (sy < -gridSize * 2 || sy > canvas.height + gridSize) return;

            ctx.fillStyle = row.color;
            ctx.fillRect(0, sy, canvas.width, gridSize);

            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            ctx.font = "bold 10px monospace";
            ctx.fillText(row.label, 10, sy + 15);

            row.entities.forEach(ent => {
                const ey = sy + (gridSize - ent.h)/2;
                ctx.save();
                ctx.translate(ent.x, ey);
                
                if (ent.isBug) {
                    const p = Math.sin((Date.now() / 150) + ent.pulseOffset) * 5;
                    ctx.fillStyle = '#ff4444';
                    ctx.fillRect(0-p/2, 0-p/2, ent.w+p, ent.h+p);
                    ctx.fillStyle = '#880000';
                    ctx.fillRect(5, 5, ent.w-10, ent.h-10);
                    // Bug eyes
                    ctx.fillStyle = 'white';
                    ctx.fillRect(10, 10, 8, 8);
                    ctx.fillRect(ent.w-18, 10, 8, 8);
                } else {
                    ctx.fillStyle = ent.color;
                    ctx.fillRect(0, 0, ent.w, ent.h);
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.strokeRect(2, 2, ent.w-4, ent.h-4);
                    ctx.fillStyle = 'white';
                    ctx.font = "10px monospace";
                    ctx.fillText(ent.label, 8, 18);
                }
                ctx.restore();
            });

            if (deco[row.y]) {
                deco[row.y].forEach(d => {
                    ctx.fillStyle = 'rgba(44, 241, 218, 0.05)';
                    ctx.fillRect(d.x, sy + gridSize/2, d.size, d.size);
                });
            }
        });

        items.forEach(itm => {
            const iy = itm.gridY * gridSize - cameraY + gridSize/2;
            const ix = itm.gridX * gridSize + gridSize/2;
            const float = Math.sin(Date.now()/200) * 10;
            ctx.font = "32px serif";
            ctx.fillText("🛡️", ix - 16, iy + 12 + float);
        });

        // Garbage Collector line
        const gsy = gcY - cameraY;
        ctx.fillStyle = 'rgba(248, 81, 73, 0.3)';
        ctx.fillRect(0, gsy, canvas.width, 2000);
        ctx.fillStyle = '#f85149';
        ctx.fillRect(0, gsy - 4, canvas.width, 4);
        ctx.font = "bold 12px monospace";
        ctx.fillText("CRITICAL_MEMORY_SCAN >>>", 20, gsy - 15);

        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y - cameraY, p.size, p.size);
        });
        ctx.globalAlpha = 1;

        bullets.forEach(b => {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(b.x-4, b.y-cameraY-4, 8, 8);
        });

        player.draw(cameraY);
        ctx.restore();

        update();
        requestAnimationFrame(draw);
    }

    function resetGame() {
        maxDistance = 0; score = 0; scoreElement.innerText = score;
        gcSpeed = 0.15;
        player.init();
        rows.length = 0;
        items.length = 0;
        for (let i = player.gridY + 10; i > -40; i--) rows.push(createRow(i));
        gameActive = true;
        messageBox.style.display = 'none';
        cameraY = player.pixelY - canvas.height + gridSize * 5;
    }

    // Input handlers
    window.addEventListener('keydown', e => {
        if (!gameActive) return;
        if (e.code === 'ArrowUp' || e.code === 'KeyW') player.move(0, -1);
        if (e.code === 'ArrowDown' || e.code === 'KeyS') player.move(0, 1);
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') player.move(-1, 0);
        if (e.code === 'ArrowRight' || e.code === 'KeyD') player.move(1, 0);
        if (e.code === 'KeyF' || e.code === 'Space') player.shoot();
    });

    document.getElementById('btn-up').onclick = () => player.move(0, -1);
    document.getElementById('btn-down').onclick = () => player.move(0, 1);
    document.getElementById('btn-left').onclick = () => player.move(-1, 0);
    document.getElementById('btn-right').onclick = () => player.move(1, 0);
    document.getElementById('btn-fire').onclick = () => player.shoot();

    // Initial rows
    player.init();
    for (let i = player.gridY + 10; i > -40; i--) rows.push(createRow(i));

    window.onload = draw;
</script>
</body>
</html>
