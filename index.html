<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yinbo Crossing - Power Up Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #05070a; 
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 1s ease;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #080a0d; 
            touch-action: none;
            transition: background-color 1s ease;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e6edf3;
            pointer-events: none;
            z-index: 10;
        }
        .stats-box {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid rgba(44, 241, 218, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            pointer-events: none;
            z-index: 50;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            gap: 8px;
            pointer-events: auto;
        }

        .ctrl-btn {
            background: rgba(48, 54, 61, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            transition: all 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5);
        }

        .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.5);
            background: #2cf1da;
            color: #0d1117;
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }

        .btn-fire {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f85149 0%, #b62323 100%);
            border: 3px solid rgba(255, 255, 255, 0.2);
            font-size: 32px;
            box-shadow: 0 6px 0 #7a1510, 0 0 20px rgba(248, 81, 73, 0.3);
            pointer-events: auto;
        }
        
        .btn-fire:active {
            box-shadow: 0 2px 0 #7a1510;
            background: #ff7b72;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 17, 23, 0.98);
            border: 2px solid #f85149;
            padding: 40px;
            text-align: center;
            color: white;
            border-radius: 24px;
            display: none;
            z-index: 100;
            width: 85%;
            max-width: 450px;
        }

        #message-box button {
            margin-top: 25px;
            padding: 16px;
            background: #238636;
            color: white;
            font-weight: 900;
            border-radius: 12px;
            width: 100%;
        }

        #audio-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }

        /* 2X Score Speed Effect Overlay */
        #speed-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(44, 241, 218, 0);
            transition: box-shadow 0.5s;
            z-index: 5;
        }
        .active-2x #speed-overlay {
            box-shadow: inset 0 0 150px rgba(44, 241, 218, 0.4);
            animation: pulse-vignette 1s infinite alternate;
        }
        @keyframes pulse-vignette {
            from { box-shadow: inset 0 0 100px rgba(44, 241, 218, 0.3); }
            to { box-shadow: inset 0 0 200px rgba(44, 241, 218, 0.5); }
        }
    </style>
</head>
<body id="game-body">

    <div id="speed-overlay"></div>

    <div id="ui-overlay">
        <div class="stats-box">
            <div class="text-[10px] uppercase tracking-[0.3em] text-teal-400 font-bold mb-1">DATA RECOVERED</div>
            <div class="text-4xl font-black italic text-white drop-shadow-lg"><span id="score">0</span></div>
            <div class="text-[10px] text-gray-400 mt-1 uppercase">Highscore: <span id="highscore">0</span></div>
            
            <div id="status-container" class="mt-2 flex flex-col gap-1">
                <div id="shield-ui" class="hidden text-[10px] text-green-400 font-bold flex items-center gap-1">
                    <span class="animate-pulse">●</span> SHIELD_PROTOCOL: ACTIVE (<span id="shield-timer">5</span>s)
                </div>
                <div id="2x-ui" class="hidden text-[10px] text-yellow-400 font-bold flex items-center gap-1">
                    <span class="animate-bounce">★</span> 2X_SCORE_MULTIPLIER: ON (<span id="2x-timer">20</span>s)
                </div>
                <div id="freeze-ui" class="hidden text-[10px] text-cyan-400 font-bold flex items-center gap-1">
                    <span class="animate-pulse">❄️</span> SYS_FREEZE: ACTIVE (<span id="freeze-timer">5</span>s)
                </div>
                <div id="spread-ui" class="hidden text-[10px] text-orange-400 font-bold flex items-center gap-1">
                    <span class="animate-pulse">🔥</span> OVERCLOCK: ON (<span id="spread-timer">10</span>s)
                </div>
            </div>
        </div>
    </div>

    <!-- Tombol Pause UI Baru -->
    <div id="pause-btn" class="absolute top-5 right-5 z-50 cursor-pointer bg-gray-800/80 rounded-xl border border-white/10 text-white shadow-lg backdrop-blur-md transition active:bg-teal-400 active:text-black flex items-center justify-center text-xl w-12 h-12" onclick="togglePause()">
        ⏸️
    </div>

    <div id="pause-screen" class="hidden absolute inset-0 bg-black/60 z-40 flex items-center justify-center backdrop-blur-sm">
        <div class="text-5xl font-black text-white tracking-[0.5em] drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">PAUSED</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="audio-hint">Press any key to start Audio</div>

    <div class="mobile-controls">
        <div class="dpad">
            <div id="btn-up" class="ctrl-btn btn-up">▲</div>
            <div id="btn-left" class="ctrl-btn btn-left">◀</div>
            <div id="btn-right" class="ctrl-btn btn-right">▶</div>
            <div id="btn-down" class="ctrl-btn btn-down">▼</div>
        </div>
        <div class="action-zone">
            <div id="btn-fire" class="ctrl-btn btn-fire">⚡</div>
        </div>
    </div>

    <div id="message-box">
        <div class="text-7xl mb-6">🐘</div>
        <h2 id="msg-title" class="text-3xl font-black mb-2 text-red-500">SYSTEM CRASH</h2>
        <p id="msg-text" class="text-gray-400 font-mono text-sm leading-relaxed"></p>
        <button onclick="resetGame()">REBOOT SYSTEM</button>
    </div>

<script>
    /** --- AUDIO ENGINE (Synthesized 16-bit sound) --- **/
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let musicStarted = false;

    function playTone(freq, type, duration, volume, slide = 0) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide !== 0) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        jump: () => playTone(150, 'triangle', 0.2, 0.2, 400),
        shoot: () => playTone(800, 'square', 0.1, 0.1, 100),
        die: () => {
            playTone(200, 'sawtooth', 0.5, 0.3, 20);
            playTone(50, 'sine', 0.5, 0.5, 10);
        },
        item: () => {
            playTone(400, 'sine', 0.1, 0.2, 800);
            setTimeout(() => playTone(600, 'sine', 0.1, 0.2, 1200), 50);
        },
        hit: () => playTone(60, 'square', 0.2, 0.3, 30),
        rocket: () => playTone(100, 'sawtooth', 1.5, 0.3, 800)
    };

    // Music Generator
    const melodies = [
        [261.63, 293.66, 329.63, 349.23, 392.00], 
        [329.63, 392.00, 440.00, 523.25]
    ];
    let musicTick = 0;
    
    function playMusic() {
        if (!gameActive) return;
        
        if (isPaused) {
            setTimeout(playMusic, 150);
            return;
        }
        
        let distToDeath = gcY - player.pixelY;
        const tempo = distToDeath < 400 ? 90 : 150; 
        
        if (musicTick % 4 === 0) {
            playTone(musicTick % 16 < 8 ? 65.41 : 49.00, 'triangle', 0.3, 0.1);
        }
        if (musicTick % 8 === 0) {
            playTone(100, 'sine', 0.1, 0.4, 10);
        }
        if (musicTick % 8 === 4) {
            const noise = audioCtx.createOscillator();
            const ng = audioCtx.createGain();
            noise.type = 'square';
            noise.frequency.setValueAtTime(Math.random() * 1000 + 500, audioCtx.currentTime);
            ng.gain.setValueAtTime(0.05, audioCtx.currentTime);
            ng.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            noise.connect(ng); ng.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.05);
        }
        if (Math.random() > 0.8) {
            const scale = melodies[0];
            const note = scale[Math.floor(Math.random() * scale.length)];
            playTone(note, 'sine', 0.4, 0.05);
        }
        musicTick++;
        setTimeout(playMusic, tempo);
    }

    function startAudioOnInteraction() {
        if (!musicStarted) {
            musicStarted = true;
            audioCtx.resume();
            playMusic();
            document.getElementById('audio-hint').style.display = 'none';
        }
    }

    /** --- GAME ENGINE --- **/
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const highscoreElement = document.getElementById('highscore');
    const messageBox = document.getElementById('message-box');
    const shieldUi = document.getElementById('shield-ui');
    const shieldTimerDisplay = document.getElementById('shield-timer');
    const doubleUi = document.getElementById('2x-ui');
    const doubleTimerDisplay = document.getElementById('2x-timer');
    
    // Elemen UI Baru
    const freezeUi = document.getElementById('freeze-ui');
    const freezeTimerDisplay = document.getElementById('freeze-timer');
    const spreadUi = document.getElementById('spread-ui');
    const spreadTimerDisplay = document.getElementById('spread-timer');
    const pauseScreen = document.getElementById('pause-screen');
    const pauseBtn = document.getElementById('pause-btn');

    const gameBody = document.getElementById('game-body');

    const gridSize = 64;
    let gameActive = true;
    let isPaused = false;
    
    let score = 0;
    let highscore = localStorage.getItem('elephant_highscore') || 0;
    highscoreElement.innerText = highscore;
    
    let maxDistance = 0;
    let cameraY = 0;
    let targetCameraY = 0;
    let shakeAmount = 0;
    let gcY = 0;
    let gcSpeed = 0.22; 
    let startGridY = 0;
    
    let comboCount = 0;
    let comboTimer = 0;

    const particles = [];
    const bullets = [];
    const items = [];
    let rows = [];
    
    let footprints = [];
    let textParticles = [];

    // --- VARIABEL SISTEM FASE LEVEL ---
    let currentPhase = 0;
    let glitchTimer = 0;

    function updatePhaseColors() {
        let bg, cvsBg, cGrass, cRoad, cRiver;
        if (currentPhase === 0) { 
            bg = '#0a1216'; cvsBg = '#0d181f'; 
            cGrass = '#1c2e36'; cRoad = '#253d47'; cRiver = '#111e26';
        } else if (currentPhase === 1) { 
            bg = '#120a14'; cvsBg = '#170d1a'; 
            cGrass = '#26152b'; cRoad = '#361e3d'; cRiver = '#1c0c21';
        } else { 
            bg = '#050000'; cvsBg = '#0d0000'; 
            cGrass = '#1a0303'; cRoad = '#000000'; cRiver = '#1a0505';
        }
        
        document.body.style.backgroundColor = bg;
        canvas.style.backgroundColor = cvsBg;
        
        // Memperbarui warna dan MENTRANSFORMASI virus seketika jika masuk fase ungu
        if (typeof rows !== 'undefined' && rows.length > 0) {
            rows.forEach(r => {
                r.color = r.type === 'grass' ? cGrass : (r.type === 'road' ? cRoad : cRiver);
                
                // --- INSTANT VIRUS MUTATION (Menjawab Bug Virus Tidak Ungu) ---
                r.entities.forEach(ent => {
                    if (ent.isBug && currentPhase >= 1) {
                        // Secara acak merubah 50% virus yang sudah ada di layar menjadi ungu
                        if (ent.bugType !== 'purple' && Math.random() > 0.5) {
                            ent.bugType = 'purple';
                            let diffMult = 1 + (Math.min(score, 10000) / 10000) * 1.5;
                            // Mempertahankan arah jalannya (kiri/kanan) tapi membuatnya lebih cepat
                            let dir = ent.moveSpeed > 0 ? 1 : -1;
                            ent.moveSpeed = 2.8 * diffMult * dir; 
                        }
                    }
                });
            });
        }
    }
    
    function spawnParticles(x, y, color, count = 10, speed = 5) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * speed,
                vy: (Math.random() - 0.5) * speed,
                life: 1,
                decay: 0.02 + Math.random() * 0.03,
                color,
                size: 2 + Math.random() * 4
            });
        }
    }

    function togglePause() {
        if (!gameActive) return;
        isPaused = !isPaused;
        pauseScreen.classList.toggle('hidden', !isPaused);
        pauseBtn.innerText = isPaused ? '▶️' : '⏸️';
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function updateScoreDisplay() {
        scoreElement.innerText = score;
        if (score > highscore) {
            highscore = score;
            highscoreElement.innerText = highscore;
            localStorage.setItem('elephant_highscore', highscore);
        }

        let newPhase = 0;
        if (score >= 8000) newPhase = 2; // Level 3
        else if (score >= 4000) newPhase = 1; // Level 2 
        
        if (newPhase > currentPhase) {
            currentPhase = newPhase;
            glitchTimer = 80; 
            sfx.rocket(); 
            updatePhaseColors(); 
        }
    }

    const player = {
        gridX: 0, gridY: 0, pixelX: 0, pixelY: 0, targetX: 0, targetY: 0,
        isMoving: false, direction: 'up', jumpAnim: 0, 
        
        hasShield: false, shieldTime: 0,
        isDoubleScore: false, doubleTime: 0,
        isRocketing: false, rocketDist: 0,
        isFrozen: false, freezeTime: 0,
        isSpread: false, spreadTime: 0, 
        isInvincible: false, // Status Cheat Invincible
        
        frame: 0, trunkAnim: 0, idleTimer: 0, breathePhase: 0,
        
        init() {
            this.gridX = Math.floor(canvas.width / 2 / gridSize);
            this.gridY = Math.floor(canvas.height / gridSize) - 2;
            startGridY = this.gridY; 
            this.targetX = this.gridX * gridSize;
            this.targetY = this.gridY * gridSize;
            this.pixelX = this.targetX;
            this.pixelY = this.targetY;
            this.hasShield = false;
            this.shieldTime = 0;
            this.isDoubleScore = false;
            this.doubleTime = 0;
            this.isRocketing = false;
            this.rocketDist = 0;
            this.isFrozen = false;
            this.freezeTime = 0;
            this.isSpread = false;
            this.spreadTime = 0;
            this.isInvincible = false; // Reset cheat saat game mengulang
            
            this.trunkAnim = 0;
            this.idleTimer = 0;
            this.breathePhase = 0;
            
            shieldUi.classList.add('hidden');
            doubleUi.classList.add('hidden');
            freezeUi.classList.add('hidden');
            spreadUi.classList.add('hidden');
            
            gameBody.classList.remove('active-2x');
            gcY = (this.gridY + 10) * gridSize; 
            cameraY = this.pixelY - canvas.height + gridSize * 3;
            targetCameraY = cameraY;
        },

        move(dx, dy) {
            if (this.isMoving || !gameActive || this.isRocketing || isPaused) return;
            startAudioOnInteraction();
            
            footprints.push({x: this.pixelX + gridSize/2, y: this.pixelY + gridSize/2 + 15, life: 1});
            
            this.gridX += dx; this.gridY += dy;
            this.targetX = this.gridX * gridSize;
            this.targetY = this.gridY * gridSize;
            this.isMoving = true;
            this.jumpAnim = 0;
            this.idleTimer = 0; 
            
            if (dx > 0) this.direction = 'right';
            if (dx < 0) this.direction = 'left';
            if (dy < 0) this.direction = 'up';
            if (dy > 0) this.direction = 'down';
            
            sfx.jump();
            spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize/2, '#2cf1da', 5, 2);

            let currentDist = startGridY - this.gridY;
            if (currentDist > maxDistance) {
                let distGained = currentDist - maxDistance;
                maxDistance = currentDist;
                score += (distGained * 10) * (this.isDoubleScore ? 2 : 1);
                updateScoreDisplay();
                gcSpeed = 0.22 + (Math.min(score, 10000) / 10000) * 0.25; 
            }
        },

        shoot() {
            if (!gameActive || this.isRocketing || isPaused) return;
            startAudioOnInteraction();
            this.trunkAnim = 1.0;
            this.idleTimer = 0; 
            sfx.shoot();
            
            let baseVx = 0, baseVy = 0;
            let spd = 14;
            if (this.direction === 'up') baseVy = -spd;
            if (this.direction === 'down') baseVy = spd;
            if (this.direction === 'left') baseVx = -spd;
            if (this.direction === 'right') baseVx = spd;

            bullets.push({ x: this.pixelX + gridSize/2, y: this.pixelY + gridSize/2, vx: baseVx, vy: baseVy, life: 60 });
            
            if (this.isSpread) {
                if (baseVy !== 0) { 
                    bullets.push({ x: this.pixelX + gridSize/2, y: this.pixelY + gridSize/2, vx: -4, vy: baseVy, life: 60 });
                    bullets.push({ x: this.pixelX + gridSize/2, y: this.pixelY + gridSize/2, vx: 4, vy: baseVy, life: 60 });
                } else { 
                    bullets.push({ x: this.pixelX + gridSize/2, y: this.pixelY + gridSize/2, vx: baseVx, vy: -4, life: 60 });
                    bullets.push({ x: this.pixelX + gridSize/2, y: this.pixelY + gridSize/2, vx: baseVx, vy: 4, life: 60 });
                }
            }
            
            spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize/2, '#ffffff', 8, 4);
            shakeAmount = 4;
        },

        activateRocket() {
            this.isRocketing = true;
            this.rocketDist = 15;
            sfx.rocket();
            this.hasShield = true; 
            this.shieldTime = Math.max(this.shieldTime, 2000);
            this.idleTimer = 0;
        },

        update() {
            this.frame++;
            this.idleTimer++;
            
            let isSleeping = this.idleTimer > 180;
            this.breathePhase += isSleeping ? 0.04 : 0.1;
            
            if (isSleeping && this.idleTimer % 60 === 0) {
                textParticles.push({
                    x: this.pixelX + gridSize/2 + (Math.random()*10 - 5), 
                    y: this.pixelY - 15, 
                    text: 'Z', life: 2, dy: -0.5, color: '#e6edf3', size: 14 + Math.random()*6
                });
            }

            if (isPaused) return; 

            if (this.isRocketing) {
                this.gridY -= 0.5;
                this.targetY = this.gridY * gridSize;
                this.pixelY = this.targetY;
                this.rocketDist -= 0.5;
                
                spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize, '#f85149', 2, 3);
                spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize, '#ff7b72', 1, 2);
                shakeAmount = 5;

                if (this.rocketDist <= 0) {
                    let currentTargetY = Math.round(this.gridY);
                    let rowObj = rows.find(r => r.y === currentTargetY);
                    if (rowObj && rowObj.type === 'grass') {
                        this.isRocketing = false;
                        this.gridY = currentTargetY;
                        this.targetY = this.gridY * gridSize;
                        
                        let currentDist = startGridY - this.gridY;
                        if (currentDist > maxDistance) {
                            let distGained = currentDist - maxDistance;
                            maxDistance = currentDist;
                            score += (distGained * 10) * (this.isDoubleScore ? 2 : 1);
                        }
                        score += 100 * (this.isDoubleScore ? 2 : 1); 
                        updateScoreDisplay();
                    } else {
                        this.rocketDist = 1;
                    }
                }
            }

            this.pixelX += (this.targetX - this.pixelX) * 0.25;
            this.pixelY += (this.targetY - this.pixelY) * 0.25;
            if (this.isMoving) {
                this.jumpAnim += 0.35;
                if (this.jumpAnim >= Math.PI) { this.jumpAnim = 0; this.isMoving = false; }
            }
            if (this.trunkAnim > 0) this.trunkAnim -= 0.12;
            
            if (this.hasShield) {
                this.shieldTime -= 16.67; 
                shieldTimerDisplay.innerText = Math.max(0, Math.ceil(this.shieldTime / 1000));
                if (this.shieldTime <= 0) { this.hasShield = false; shieldUi.classList.add('hidden'); }
            }

            if (this.isDoubleScore) {
                this.doubleTime -= 16.67;
                doubleTimerDisplay.innerText = Math.max(0, Math.ceil(this.doubleTime / 1000));
                if (this.doubleTime <= 0) {
                    this.isDoubleScore = false; doubleUi.classList.add('hidden');
                    gameBody.classList.remove('active-2x'); updateScoreDisplay(); 
                }
            }
            
            if (this.isFrozen) {
                this.freezeTime -= 16.67;
                freezeTimerDisplay.innerText = Math.max(0, Math.ceil(this.freezeTime / 1000));
                if (this.freezeTime <= 0) { this.isFrozen = false; freezeUi.classList.add('hidden'); }
            }
            
            if (this.isSpread) {
                this.spreadTime -= 16.67;
                spreadTimerDisplay.innerText = Math.max(0, Math.ceil(this.spreadTime / 1000));
                if (this.spreadTime <= 0) { this.isSpread = false; spreadUi.classList.add('hidden'); }
            }
        },

        draw(camY) {
            const jumpH = Math.sin(this.jumpAnim) * 24;
            const dx = this.pixelX + gridSize/2;
            const dy = this.pixelY + gridSize/2 - camY - jumpH;

            let isSleeping = this.idleTimer > 180;

            ctx.save();
            ctx.translate(dx, dy);

            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 26 + jumpH/2, 24 - jumpH/4, 8 - jumpH/8, 0, 0, Math.PI*2);
            ctx.fill();

            const tsc = '#2cf1da';
            const tscD = '#1ebca9';
            const tscL = '#61ffed';
            
            const brth = Math.sin(this.breathePhase) * (isSleeping ? 2.5 : 2);

            if (this.direction === 'left') ctx.scale(-1, 1);

            ctx.fillStyle = '#0f6359';
            ctx.fillRect(-15, 10, 8, 16); 
            ctx.fillRect(7, 10, 8, 16);
            
            ctx.fillStyle = tscD;
            ctx.fillRect(-22, -12 + brth, 44, 28); 
            ctx.fillStyle = tsc;
            ctx.fillRect(-22, -12 + brth, 44, 22); 
            ctx.fillStyle = tscL;
            ctx.fillRect(-22, -12 + brth, 44, 6);  

            ctx.fillStyle = '#147a6e';
            ctx.fillRect(-10, 12, 9, 14); 
            ctx.fillRect(1, 12, 9, 14);

            ctx.fillStyle = tsc;
            ctx.fillRect(-20, -32 + brth, 40, 24);
            ctx.fillStyle = tscL;
            ctx.fillRect(-20, -32 + brth, 40, 5); 

            const earWave = isSleeping ? 0 : Math.sin(this.frame * 0.08) * 4;
            const earDropY = isSleeping ? 4 : 0; 
            ctx.fillStyle = tscD;
            ctx.fillRect(-32 - earWave, -30 + brth + earDropY, 14, 22); 
            ctx.fillRect(18 + earWave, -30 + brth + earDropY, 14, 22);  
            
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(12, -14 + brth, 6, 12);
            ctx.fillRect(-18, -14 + brth, 6, 12);

            let isBlinking = isSleeping || (this.frame % 150 > 140);
            
            if (isBlinking) {
                ctx.fillStyle = tscD;
                ctx.fillRect(6, -23 + brth, 8, 4); 
                ctx.fillRect(-14, -23 + brth, 8, 4);
            } else {
                ctx.fillStyle = 'black';
                ctx.fillRect(7, -24 + brth, 6, 6); ctx.fillRect(-13, -24 + brth, 6, 6);
                ctx.fillStyle = 'white';
                ctx.fillRect(10, -24 + brth, 2, 2); ctx.fillRect(-10, -24 + brth, 2, 2);
            }

            if (this.trunkAnim > 0) {
                ctx.fillStyle = '#0f6359';
                ctx.save(); ctx.translate(-10, -26 + brth); ctx.rotate(0.15); ctx.fillRect(-4, 0, 8, 3); ctx.restore();
                ctx.save(); ctx.translate(10, -26 + brth); ctx.rotate(-0.15); ctx.fillRect(-4, 0, 8, 3); ctx.restore();
                
                ctx.fillStyle = '#1a0505'; 
                const mouthHeight = 4 + (this.trunkAnim * 8);
                ctx.fillRect(-6, -13 + brth, 12, mouthHeight);
                ctx.fillStyle = '#f85149'; 
                ctx.fillRect(-3, -13 + brth + mouthHeight - 3, 6, 3);
            } else if (isSleeping) {
                ctx.fillStyle = '#1a0505';
                let snoreOpen = Math.max(0, Math.sin(this.breathePhase) * 6);
                if (snoreOpen > 0) {
                    ctx.fillRect(-4, -13 + brth, 8, snoreOpen);
                }
            }

            ctx.save();
            ctx.fillStyle = tsc;
            let ang = this.direction === 'up' ? -1.3 : (this.direction === 'down' ? 1.3 : -0.2);
            
            if (isSleeping && this.trunkAnim <= 0) {
                ang = 1.3; 
            }
            
            ctx.translate(0, -10 + brth); 
            ctx.rotate(ang);
            ctx.fillRect(-4, -4, 24 + (this.trunkAnim * 25), 10);
            ctx.restore();

            if (this.isRocketing) {
                ctx.fillStyle = '#f85149';
                ctx.fillRect(-10, 20, 20, 15);
                ctx.fillStyle = '#ff7b72';
                ctx.fillRect(-5, 35, 10, 10 + Math.random()*15);
            }

            if (this.isFrozen) {
                ctx.strokeStyle = 'rgba(88, 166, 255, 0.5)';
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.arc(0, 0, 52 + Math.sin(this.frame*0.1)*5, 0, Math.PI*2);
                ctx.stroke();
            }

            if (this.hasShield) {
                ctx.strokeStyle = '#3fb950';
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 4]);
                ctx.lineDashOffset = -this.frame * 2;
                ctx.beginPath();
                ctx.arc(0, 0, 48, 0, Math.PI*2);
                ctx.stroke();
            }

            // Aura Emas saat Cheat Invincible Aktif
            if (this.isInvincible) {
                ctx.strokeStyle = '#e3b341';
                ctx.lineWidth = 4;
                ctx.setLineDash([10, 5]);
                ctx.lineDashOffset = -this.frame * 4;
                ctx.beginPath();
                ctx.arc(0, 0, 55, 0, Math.PI*2);
                ctx.stroke();
            }
            ctx.restore();
        }
    };

    function createRow(y, forceType = null) {
        const types = ['grass', 'road', 'road', 'river', 'grass'];
        let type = forceType || types[Math.floor(Math.random() * types.length)];
        let diffMult = 1 + (Math.min(score, 10000) / 10000) * 1.5;

        let cGrass, cRoad, cRiver;
        if (currentPhase === 0) {
            cGrass = '#1c2e36'; cRoad = '#253d47'; cRiver = '#111e26';
        } else if (currentPhase === 1) {
            cGrass = '#26152b'; cRoad = '#361e3d'; cRiver = '#1c0c21';
        } else {
            cGrass = '#1a0303'; cRoad = '#000000'; cRiver = '#1a0505'; 
        }

        const row = {
            y: y, type: type, entities: [],
            speed: (Math.random() * 2 + 1.2) * diffMult * (Math.random() > 0.5 ? 1 : -1),
            color: type === 'grass' ? cGrass : (type === 'road' ? cRoad : cRiver),
            deco: []
        };

        if (type === 'grass') {
            for(let i=0; i<8; i++) {
                row.deco.push({x: Math.random() * canvas.width, size: 2 + Math.random()*3, opacity: 0.1 + Math.random()*0.3});
            }
        }

        if (type === 'road') {
            for (let i = 0; i < 2; i++) row.entities.push({ 
                x: Math.random() * canvas.width, w: 110, h: 42, color: '#3fb950' 
            });
        } else if (type === 'river') {
            row.speed *= 0.7;
            for (let i = 0; i < 3; i++) row.entities.push({ 
                x: Math.random() * canvas.width, w: 140, h: 46, color: 'rgba(0, 255, 255, 0.2)' 
            });
        } else if (type === 'grass') {
            let bugThreshold = 0.65 - (Math.min(score, 10000) / 10000) * 0.35;
            
            if (y < player.gridY - 4 && Math.random() > bugThreshold) {
                let bType = 'green';
                let bSpeed = 1.2 * diffMult; 
                
                if (score >= 4000 && Math.random() > 0.5) {
                    bType = 'purple';
                    bSpeed = 2.8 * diffMult; 
                }

                let initialDir = Math.random() > 0.5 ? 1 : -1;

                row.entities.push({ 
                    x: Math.random() * canvas.width, isBug: true, bugType: bType, w: 44, h: 44, 
                    moveSpeed: bSpeed * initialDir, glow: 0 
                });
            }
            
            if (Math.random() > 0.95) {
                let r = Math.random();
                let itmX = Math.floor(Math.random() * (canvas.width/gridSize));
                if (r < 0.2) items.push({ gridX: itmX, gridY: y, type: 'shield' });
                else if (r < 0.4) items.push({ gridX: itmX, gridY: y, type: 'double' });
                else if (r < 0.6) items.push({ gridX: itmX, gridY: y, type: 'rocket' });
                else if (r < 0.8) items.push({ gridX: itmX, gridY: y, type: 'freeze' });
                else items.push({ gridX: itmX, gridY: y, type: 'spread' });
            }
        }
        return row;
    }

    function checkCollision(title, text) {
        if (player.hasShield || player.isRocketing || player.isInvincible) return; // Tambahan bypass cheat di sini
        gameActive = false;
        isPaused = false;
        pauseBtn.style.display = 'none';
        sfx.die();
        shakeAmount = 40;
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-text').innerText = text;
        messageBox.style.display = 'block';
    }

    function initMap() {
        rows = [];
        items.length = 0;
        for (let i = player.gridY + 10; i > -40; i--) {
            let type = null;
            if (i >= player.gridY - 1 && i <= player.gridY + 1) type = 'grass';
            rows.push(createRow(i, type));
        }
    }

    function update() {
        if (!gameActive) return;
        
        player.update(); 
        
        targetCameraY = player.pixelY - canvas.height + gridSize * 3;
        cameraY += (targetCameraY - cameraY) * 0.08;
        
        for (let i = textParticles.length - 1; i >= 0; i--) {
            const p = textParticles[i];
            p.y += p.dy; p.life -= 0.02;
            if (p.life <= 0) textParticles.splice(i, 1);
        }

        if (isPaused) return; 

        if (comboTimer > 0) {
            comboTimer--;
            if (comboTimer === 0) comboCount = 0; 
        }
        
        if (shakeAmount > 0) shakeAmount *= 0.9;
        
        let timeScale = player.isFrozen ? 0.2 : 1;
        
        gcY -= (gcSpeed * timeScale);

        if (player.pixelY + 30 > gcY) checkCollision("MEMORY PURGE", "Elephant failed to avoid the memory sweep!");

        for (let i = footprints.length - 1; i >= 0; i--) {
            footprints[i].life -= 0.01;
            if (footprints[i].life <= 0) footprints.splice(i, 1);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        bullets.forEach((b, i) => {
            b.x += b.vx; 
            b.y += b.vy;
            b.life--;
            rows.forEach(row => {
                row.entities.forEach((ent, j) => {
                    if (ent.isBug) {
                        const ey = row.y * gridSize + (gridSize-ent.h)/2;
                        if (b.x > ent.x && b.x < ent.x + ent.w && b.y > ey && b.y < ey + ent.h) {
                            sfx.hit();
                            
                            let pColor = ent.bugType === 'purple' ? '#df3bf0' : '#78e038';
                            spawnParticles(ent.x + ent.w/2, ey + ent.h/2, pColor, 20, 8); 
                            
                            row.entities.splice(j, 1);
                            bullets.splice(i, 1);
                            
                            comboCount++;
                            comboTimer = 120; 
                            let comboBonus = comboCount > 1 ? (comboCount * 50) : 0;
                            let gainedScore = (150 + comboBonus) * (player.isDoubleScore ? 2 : 1);
                            score += gainedScore;
                            
                            let msg = comboCount > 1 ? `COMBO x${comboCount}!` : `+${gainedScore}`;
                            textParticles.push({
                                x: ent.x + 20, y: ey, 
                                text: msg, life: 1.5, dy: -1.5, 
                                color: comboCount > 1 ? '#e3b341' : pColor, 
                                size: comboCount > 1 ? 24 : 16
                            });
                            
                            updateScoreDisplay();
                        }
                    }
                });
            });
            if (b.life <= 0) bullets.splice(i, 1);
        });

        items.forEach((itm, i) => {
            if (player.gridX === itm.gridX && Math.round(player.gridY) === itm.gridY) {
                sfx.item();
                if (itm.type === 'shield') {
                    player.hasShield = true; player.shieldTime = 5000; shieldUi.classList.remove('hidden');
                } else if (itm.type === 'double') {
                    player.isDoubleScore = true; player.doubleTime = 20000; doubleUi.classList.remove('hidden'); gameBody.classList.add('active-2x'); updateScoreDisplay();
                } else if (itm.type === 'rocket') {
                    player.activateRocket();
                } else if (itm.type === 'freeze') {
                    player.isFrozen = true; player.freezeTime = 5000; freezeUi.classList.remove('hidden');
                } else if (itm.type === 'spread') {
                    player.isSpread = true; player.spreadTime = 10000; spreadUi.classList.remove('hidden');
                }
                
                spawnParticles(player.pixelX + gridSize/2, player.pixelY + gridSize/2, '#ffffff', 20, 5);
                items.splice(i, 1);
            }
        });

        let shiftedByLog = false;
        rows.forEach(row => {
            row.entities.forEach(ent => {
                if (ent.isBug) {
                    ent.x += (ent.moveSpeed * timeScale); 
                    if (ent.x > canvas.width || ent.x < 0) ent.moveSpeed *= -1;
                    ent.glow = (Math.sin(Date.now()/200) + 1) / 2;
                } else {
                    ent.x += (row.speed * timeScale); 
                    if (ent.x > canvas.width + 120) ent.x = -120; if (ent.x < -120) ent.x = canvas.width + 120;
                }
                const px = player.pixelX + 22; const py = player.pixelY + 22;
                const ey = row.y * gridSize + (gridSize-ent.h)/2;
                if ((row.type === 'road' || ent.isBug) && !player.isMoving && !player.isRocketing) {
                    if (px < ent.x+ent.w && px+20 > ent.x && py < ey+ent.h && py+20 > ey) checkCollision("DATA LOSS", "Data packet collision detected!");
                }
            });
            
            if (!shiftedByLog && row.type === 'river' && Math.round(player.pixelY/gridSize) === row.y && !player.isMoving && !player.isRocketing) {
                let safe = false;
                for(let log of row.entities) {
                    if (player.pixelX+gridSize/2 > log.x && player.pixelX+gridSize/2 < log.x+log.w) {
                        safe = true; 
                        player.pixelX += (row.speed * timeScale); 
                        player.targetX = player.pixelX;
                        player.gridX = Math.round(player.pixelX/gridSize);
                        shiftedByLog = true;
                        break;
                    }
                }
                if (!safe && !player.hasShield && !player.isInvincible) checkCollision("SEGMENTATION FAULT", "Elephant fell into the memory stream!"); // Tambahan bypass cheat di sini
            }
        });

        if (Math.floor(player.pixelY/gridSize) < rows[rows.length-12].y) rows.push(createRow(rows[rows.length-1].y - 1));
    }

    function draw() {
        ctx.save();
        if (shakeAmount > 1) ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
        
        ctx.clearRect(0,0, canvas.width, canvas.height);

        if (glitchTimer > 0) {
            glitchTimer--;
            ctx.translate((Math.random()-0.5)*25, (Math.random()-0.5)*25);
            ctx.fillStyle = Math.random() > 0.5 ? `rgba(255,255,255,0.05)` : `rgba(255,0,0,0.05)`;
            ctx.fillRect(-50, -50, canvas.width+100, canvas.height+100);
            
            if (glitchTimer % 10 > 2) { 
                ctx.save();
                ctx.fillStyle = '#f85149';
                ctx.font = '900 32px monospace';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'red';
                let msg = currentPhase === 1 ? "WARNING: SYSTEM CORRUPTION" : "CRITICAL: NIGHTMARE PROTOCOL";
                ctx.fillText(msg, canvas.width/2, canvas.height/2);
                ctx.restore();
            }
        }
        
        footprints.forEach(p => {
            ctx.globalAlpha = Math.max(0, p.life * 0.4);
            ctx.fillStyle = '#2cf1da';
            ctx.fillRect(p.x - 8, p.y - cameraY, 5, 5);
            ctx.fillRect(p.x + 3, p.y - cameraY, 5, 5);
        });
        ctx.globalAlpha = 1;

        rows.forEach(row => {
            const sy = row.y * gridSize - cameraY;
            if (sy < -gridSize * 2 || sy > canvas.height + gridSize) return;
            
            ctx.fillStyle = row.color; 
            ctx.fillRect(0, sy, canvas.width, gridSize);

            if (row.type === 'river') {
                const cableColors = ['#f85149', '#3fb950', '#58a6ff', '#e3b341'];
                for (let i = 0; i < gridSize; i += 12) {
                    const colorIdx = (Math.abs(row.y) + Math.floor(i/12)) % cableColors.length;
                    
                    ctx.strokeStyle = '#010409';
                    ctx.lineWidth = 7;
                    ctx.beginPath();
                    for (let x = 0; x <= canvas.width + 40; x += 40) {
                        const wave = Math.sin((x + row.y * 50) * 0.03 + (i * 0.5)) * 6;
                        if (x === 0) ctx.moveTo(x, sy + i + 8 + wave);
                        else ctx.lineTo(x, sy + i + 8 + wave);
                    }
                    ctx.stroke();
                    
                    ctx.strokeStyle = cableColors[colorIdx];
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    for (let x = 0; x <= canvas.width + 40; x += 40) {
                        const wave = Math.sin((x + row.y * 50) * 0.03 + (i * 0.5)) * 6;
                        if (x === 0) ctx.moveTo(x, sy + i + 8 + wave);
                        else ctx.lineTo(x, sy + i + 8 + wave);
                    }
                    ctx.stroke();
                }
            }

            if (row.type === 'grass') {
                row.deco.forEach(d => {
                    let dotColor = '44, 241, 218'; 
                    if (currentPhase === 1) dotColor = '200, 0, 255'; 
                    if (currentPhase === 2) dotColor = '255, 0, 0'; 
                    ctx.fillStyle = `rgba(${dotColor}, ${d.opacity})`;
                    ctx.fillRect(d.x, sy + gridSize/2, d.size, d.size);
                });
            }

            row.entities.forEach(ent => {
                const ey = sy + (gridSize-ent.h)/2;
                ctx.save();
                
                if (ent.isBug) {
                    const p = ent.w / 15; 
                    const bugX = ent.x; const bugY = ey;
                    const isAlt = Math.floor(Date.now() / 300) % 2 === 0;
                    
                    if (ent.bugType === 'purple') {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = `rgba(223, 59, 240, ${ent.glow})`;
                        
                        ctx.fillStyle = '#df3bf0';
                        ctx.fillRect(bugX + 6*p, bugY + 1*p, 3*p, p);
                        ctx.fillRect(bugX + 5*p, bugY + 2*p, 5*p, p);
                        ctx.fillRect(bugX + 4*p, bugY + 3*p, 7*p, p);
                        ctx.fillRect(bugX + 3*p, bugY + 4*p, 9*p, 4*p); 
                        ctx.fillRect(bugX + 5*p, bugY + 8*p, 5*p, 2*p); 
                        ctx.fillRect(bugX + 6*p, bugY + 10*p, 3*p, p);

                        const armRaise = isAlt ? 0 : 1;
                        ctx.fillRect(bugX + 0*p, bugY + (4+armRaise)*p, 2*p, p);
                        ctx.fillRect(bugX + 1*p, bugY + (5+armRaise)*p, 2*p, p);
                        ctx.fillRect(bugX + 2*p, bugY + (6+armRaise)*p, 2*p, p);
                        
                        ctx.fillRect(bugX + 13*p, bugY + (4+armRaise)*p, 2*p, p);
                        ctx.fillRect(bugX + 12*p, bugY + (5+armRaise)*p, 2*p, p);
                        ctx.fillRect(bugX + 11*p, bugY + (6+armRaise)*p, 2*p, p);

                        const legShift = isAlt ? 0 : 1;
                        ctx.fillRect(bugX + (5+legShift)*p, bugY + 10*p, p, 3*p);
                        ctx.fillRect(bugX + (4+legShift)*p, bugY + 13*p, 2*p, p);
                        
                        ctx.fillRect(bugX + (9-legShift)*p, bugY + 10*p, p, 3*p);
                        ctx.fillRect(bugX + (9-legShift)*p, bugY + 13*p, 2*p, p);

                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(bugX + 4*p, bugY + 4*p, 3*p, 2*p);
                        ctx.fillRect(bugX + 8*p, bugY + 4*p, 3*p, 2*p);

                        ctx.fillStyle = '#000000';
                        ctx.fillRect(bugX + 5*p, bugY + 4.5*p, p, p);
                        ctx.fillRect(bugX + 9*p, bugY + 4.5*p, p, p);

                    } else {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = `rgba(120, 224, 56, ${ent.glow})`;
                        
                        ctx.fillStyle = '#78e038';
                        ctx.fillRect(bugX + 5*p, bugY + 1*p, 5*p, p);
                        ctx.fillRect(bugX + 4*p, bugY + 2*p, 7*p, p);
                        ctx.fillRect(bugX + 3*p, bugY + 3*p, 9*p, p);
                        ctx.fillRect(bugX + 2*p, bugY + 4*p, 11*p, 8*p);
                        
                        if (isAlt) {
                            ctx.fillRect(bugX + 2*p, bugY + 12*p, 2*p, 2*p);
                            ctx.fillRect(bugX + 5*p, bugY + 12*p, 2*p, 3*p);
                            ctx.fillRect(bugX + 8*p, bugY + 12*p, 2*p, 3*p);
                            ctx.fillRect(bugX + 11*p, bugY + 12*p, 2*p, 2*p);
                        } else {
                            ctx.fillRect(bugX + 3*p, bugY + 12*p, 2*p, 3*p);
                            ctx.fillRect(bugX + 6*p, bugY + 12*p, 3*p, 2*p);
                            ctx.fillRect(bugX + 10*p, bugY + 12*p, 2*p, 3*p);
                        }

                        const armY = isAlt ? 7*p : 6*p;
                        ctx.fillRect(bugX + 0, bugY + armY, 2*p, 2*p);
                        ctx.fillRect(bugX + 13*p, bugY + armY, 2*p, 2*p);

                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(bugX + 6*p, bugY + 5*p, 3*p, 4*p);
                        ctx.fillRect(bugX + 5*p, bugY + 6*p, 5*p, 2*p);

                        ctx.fillStyle = '#000000';
                        ctx.fillRect(bugX + 6.5*p, bugY + 6.5*p, 2*p, 1.5*p);
                    }
                    
                } else if (row.type === 'road') {
                    ctx.fillStyle = ent.color;
                    ctx.shadowBlur = 10; ctx.shadowColor = '#3fb950';
                    ctx.fillRect(ent.x, ey, ent.w, ent.h);
                } else if (row.type === 'river') {
                    let logFill = 'rgba(0, 255, 255, 0.35)';
                    let logStroke = 'rgba(0, 255, 255, 0.9)';
                    if (currentPhase === 1) { logFill = 'rgba(255, 0, 255, 0.35)'; logStroke = 'rgba(255, 0, 255, 0.9)'; }
                    if (currentPhase === 2) { logFill = 'rgba(255, 0, 0, 0.35)'; logStroke = 'rgba(255, 0, 0, 0.9)'; }
                    
                    ctx.fillStyle = logFill;
                    ctx.strokeStyle = logStroke;
                    ctx.lineWidth = 2;
                    ctx.fillRect(ent.x, ey, ent.w, ent.h);
                    ctx.strokeRect(ent.x, ey, ent.w, ent.h);
                }
                ctx.restore();
            });
        });

        items.forEach(itm => {
            ctx.save(); 
            const iy = itm.gridY * gridSize - cameraY + gridSize/2;
            const float = Math.sin(Date.now()/250) * 8;
            ctx.shadowBlur = 12;
            ctx.font = "32px serif"; 
            let emoji = "🛡️";
            if (itm.type === 'double') { emoji = "⭐"; ctx.shadowColor = "#e3b341"; }
            else if (itm.type === 'rocket') { emoji = "🚀"; ctx.shadowColor = "#f85149"; }
            else if (itm.type === 'freeze') { emoji = "❄️"; ctx.shadowColor = "#58a6ff"; }
            else if (itm.type === 'spread') { emoji = "🔥"; ctx.shadowColor = "#f85149"; }
            
            ctx.fillText(emoji, itm.gridX * gridSize + 15, iy + 10 + float);
            ctx.restore(); 
        });

        const gsy = gcY - cameraY;
        const grad = ctx.createLinearGradient(0, gsy, 0, gsy + 400);
        let gcColorBase = '255, 150, 0'; 
        let gcColorHex = '#ff9600';
        if (currentPhase === 1) { gcColorBase = '200, 0, 255'; gcColorHex = '#c800ff'; } 
        if (currentPhase === 2) { gcColorBase = '248, 81, 73'; gcColorHex = '#f85149'; } 
        
        grad.addColorStop(0, `rgba(${gcColorBase}, 0.45)`);
        grad.addColorStop(1, `rgba(${gcColorBase}, 0)`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, gsy, canvas.width, 1000);
        ctx.fillStyle = gcColorHex;
        ctx.fillRect(0, gsy - 4, canvas.width, 4);

        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y - cameraY, p.size, p.size);
        });
        ctx.globalAlpha = 1;

        bullets.forEach(b => { 
            ctx.save(); 
            ctx.shadowBlur = 10; ctx.shadowColor = 'white';
            ctx.fillStyle = 'white'; ctx.fillRect(b.x-4, b.y-cameraY-4, 8, 8);
            ctx.restore();
        });
        
        textParticles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            ctx.font = `900 ${p.size}px monospace`;
            ctx.shadowBlur = 10;
            ctx.shadowColor = p.color;
            ctx.fillText(p.text, p.x, p.y - cameraY);
            ctx.restore();
        });

        player.draw(cameraY);
        ctx.restore();
        
        update();
        requestAnimationFrame(draw);
    }

    function resetGame() {
        maxDistance = 0; score = 0; 
        scoreElement.innerText = score;
        gcSpeed = 0.22; 
        currentPhase = 0; 
        glitchTimer = 0;
        isPaused = false;
        pauseBtn.style.display = 'flex';
        comboCount = 0; comboTimer = 0;
        textParticles = []; footprints = [];
        updatePhaseColors(); 
        player.init(); 
        initMap();
        gameActive = true; messageBox.style.display = 'none';
        if (musicStarted) playMusic();
    }

    const bind = (id, fn) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); fn(); });
        el.addEventListener('mousedown', (e) => { e.preventDefault(); fn(); });
    };

    bind('btn-up', () => player.move(0, -1));
    bind('btn-down', () => player.move(0, 1));
    bind('btn-left', () => player.move(-1, 0));
    bind('btn-right', () => player.move(1, 0));
    bind('btn-fire', () => player.shoot());

    window.addEventListener('keydown', e => {
        if (e.code === 'ArrowUp' || e.code === 'KeyW') player.move(0, -1);
        if (e.code === 'ArrowDown' || e.code === 'KeyS') player.move(0, 1);
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') player.move(-1, 0);
        if (e.code === 'ArrowRight' || e.code === 'KeyD') player.move(1, 0);
        if (e.code === 'Space' || e.code === 'KeyF') player.shoot();
        if (e.code === 'Escape' || e.code === 'KeyP') togglePause();
    });

    // --- ADMIN CHEAT LOGIC ---
    let cheatCode = "leonita";
    let cheatInput = "";
    let cheatTimer = null;

    window.addEventListener('keydown', e => {
        // Cek jika tombol yang ditekan adalah huruf
        if (e.key && e.key.length === 1 && e.key.match(/[a-zA-Z]/)) {
            if (cheatInput === "") {
                // Mulai batas waktu 5 detik dari ketikan huruf pertama
                cheatTimer = setTimeout(() => {
                    cheatInput = "";
                }, 5000);
            }
            
            cheatInput += e.key.toLowerCase();
            
            // Jika kata "leonita" berhasil diketik sebelum 5 detik habis
            if (cheatInput.includes(cheatCode)) {
                player.isInvincible = true; // Aktifkan God Mode
                cheatInput = ""; // Reset input
                clearTimeout(cheatTimer); // Hentikan timer
                
                // Efek Suara & Visual Teks saat Cheat Aktif
                sfx.item();
                textParticles.push({
                    x: player.pixelX + gridSize/2, 
                    y: player.pixelY, 
                    text: "GOD MODE ACTIVATED", 
                    life: 3, 
                    dy: -1.5, 
                    color: '#e3b341', 
                    size: 20
                });
            }
        }
    });

    updatePhaseColors(); 
    player.init();
    initMap();
    window.onload = draw;
</script>
</body>
</html>
