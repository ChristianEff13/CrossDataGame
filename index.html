<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gajah Pixel - Pro Graphics & Bottom Spawn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #05070a;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #080a0d;
            touch-action: none;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e6edf3;
            pointer-events: none;
            z-index: 10;
        }
        .stats-box {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid rgba(44, 241, 218, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            pointer-events: none;
            z-index: 50;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            gap: 8px;
            pointer-events: auto;
        }

        .ctrl-btn {
            background: rgba(48, 54, 61, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            transition: all 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5);
        }

        .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.5);
            background: #2cf1da;
            color: #0d1117;
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }

        .btn-fire {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f85149 0%, #b62323 100%);
            border: 3px solid rgba(255, 255, 255, 0.2);
            font-size: 32px;
            box-shadow: 0 6px 0 #7a1510, 0 0 20px rgba(248, 81, 73, 0.3);
            pointer-events: auto;
        }
        
        .btn-fire:active {
            box-shadow: 0 2px 0 #7a1510;
            background: #ff7b72;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 17, 23, 0.98);
            border: 2px solid #f85149;
            padding: 40px;
            text-align: center;
            color: white;
            border-radius: 24px;
            display: none;
            z-index: 100;
            width: 85%;
            max-width: 450px;
        }

        #message-box button {
            margin-top: 25px;
            padding: 16px;
            background: #238636;
            color: white;
            font-weight: 900;
            border-radius: 12px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="stats-box">
            <div class="text-[10px] uppercase tracking-[0.3em] text-teal-400 font-bold mb-1">DATA RECOVERED</div>
            <div class="text-4xl font-black italic text-white drop-shadow-lg"><span id="score">0</span></div>
            <div id="shield-ui" class="hidden text-[10px] text-green-400 font-bold mt-2 flex items-center gap-1">
                <span class="animate-pulse">●</span> SHIELD_PROTOCOL: AKTIF (<span id="shield-timer">10</span>s)
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="mobile-controls">
        <div class="dpad">
            <div id="btn-up" class="ctrl-btn btn-up">▲</div>
            <div id="btn-left" class="ctrl-btn btn-left">◀</div>
            <div id="btn-right" class="ctrl-btn btn-right">▶</div>
            <div id="btn-down" class="ctrl-btn btn-down">▼</div>
        </div>
        <div class="action-zone">
            <div id="btn-fire" class="ctrl-btn btn-fire">⚡</div>
        </div>
    </div>

    <div id="message-box">
        <div class="text-7xl mb-6">🐘</div>
        <h2 id="msg-title" class="text-3xl font-black mb-2 text-red-500">SYSTEM CRASH</h2>
        <p id="msg-text" class="text-gray-400 font-mono text-sm leading-relaxed"></p>
        <button onclick="resetGame()">REBOOT SYSTEM</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const messageBox = document.getElementById('message-box');
    const shieldUi = document.getElementById('shield-ui');
    const shieldTimerDisplay = document.getElementById('shield-timer');

    const gridSize = 64;
    let gameActive = true;
    let score = 0;
    let maxDistance = 0;
    let cameraY = 0;
    let targetCameraY = 0;
    let shakeAmount = 0;
    let gcY = 0;
    let gcSpeed = 0.22; 
    let startGridY = 0;

    const particles = [];
    const bullets = [];
    const items = [];
    const rows = [];
    
    function spawnParticles(x, y, color, count = 10, speed = 5) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * speed,
                vy: (Math.random() - 0.5) * speed,
                life: 1,
                decay: 0.02 + Math.random() * 0.03,
                color,
                size: 2 + Math.random() * 4
            });
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const player = {
        gridX: 0, gridY: 0, pixelX: 0, pixelY: 0, targetX: 0, targetY: 0,
        isMoving: false, direction: 'up', jumpAnim: 0, hasShield: false,
        shieldTime: 0, frame: 0, trunkAnim: 0,
        
        init() {
            this.gridX = Math.floor(canvas.width / 2 / gridSize);
            this.gridY = Math.floor(canvas.height / gridSize) - 2;
            startGridY = this.gridY; 
            this.targetX = this.gridX * gridSize;
            this.targetY = this.gridY * gridSize;
            this.pixelX = this.targetX;
            this.pixelY = this.targetY;
            this.hasShield = false;
            this.shieldTime = 0;
            this.trunkAnim = 0;
            shieldUi.classList.add('hidden');
            gcY = (this.gridY + 10) * gridSize; 
            cameraY = this.pixelY - canvas.height + gridSize * 3;
            targetCameraY = cameraY;
        },

        move(dx, dy) {
            if (this.isMoving || !gameActive) return;
            this.gridX += dx; this.gridY += dy;
            this.targetX = this.gridX * gridSize;
            this.targetY = this.gridY * gridSize;
            this.isMoving = true;
            this.jumpAnim = 0;
            if (dx > 0) this.direction = 'right';
            if (dx < 0) this.direction = 'left';
            if (dy < 0) this.direction = 'up';
            if (dy > 0) this.direction = 'down';
            
            spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize/2, '#2cf1da', 5, 2);

            let currentDist = startGridY - this.gridY;
            if (currentDist > maxDistance) {
                maxDistance = currentDist;
                score = maxDistance * 10;
                scoreElement.innerText = score;
                gcSpeed = 0.22 + (score / 4500);
            }
        },

        shoot() {
            if (!gameActive) return;
            this.trunkAnim = 1.0;
            bullets.push({
                x: this.pixelX + gridSize/2, y: this.pixelY + gridSize/2,
                dir: this.direction, speed: 14, life: 60
            });
            spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize/2, '#ffffff', 8, 4);
            shakeAmount = 4;
        },

        update() {
            this.pixelX += (this.targetX - this.pixelX) * 0.25;
            this.pixelY += (this.targetY - this.pixelY) * 0.25;
            if (this.isMoving) {
                this.jumpAnim += 0.35;
                if (this.jumpAnim >= Math.PI) { this.jumpAnim = 0; this.isMoving = false; }
            }
            if (this.trunkAnim > 0) this.trunkAnim -= 0.12;
            
            if (this.hasShield) {
                this.shieldTime -= 16.67; 
                shieldTimerDisplay.innerText = Math.max(0, Math.ceil(this.shieldTime / 1000));
                if (this.shieldTime <= 0) {
                    this.hasShield = false;
                    shieldUi.classList.add('hidden');
                }
            }
            
            this.frame++;
        },

        draw(camY) {
            const jumpH = Math.sin(this.jumpAnim) * 24;
            const dx = this.pixelX + gridSize/2;
            const dy = this.pixelY + gridSize/2 - camY - jumpH;

            ctx.save();
            ctx.translate(dx, dy);

            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 26 + jumpH/2, 24 - jumpH/4, 8 - jumpH/8, 0, 0, Math.PI*2);
            ctx.fill();

            const tsc = '#2cf1da';
            const tscD = '#1ebca9';
            const tscL = '#61ffed';
            const brth = Math.sin(this.frame * 0.1) * 2;

            if (this.direction === 'left') ctx.scale(-1, 1);

            ctx.fillStyle = '#0f6359';
            ctx.fillRect(-15, 10, 8, 16); 
            ctx.fillRect(7, 10, 8, 16);
            
            ctx.fillStyle = tscD;
            ctx.fillRect(-22, -12 + brth, 44, 28); 
            ctx.fillStyle = tsc;
            ctx.fillRect(-22, -12 + brth, 44, 22); 
            ctx.fillStyle = tscL;
            ctx.fillRect(-22, -12 + brth, 44, 6);  

            ctx.fillStyle = '#147a6e';
            ctx.fillRect(-10, 12, 9, 14); 
            ctx.fillRect(1, 12, 9, 14);

            ctx.fillStyle = tsc;
            ctx.fillRect(-20, -32 + brth, 40, 24);
            ctx.fillStyle = tscL;
            ctx.fillRect(-20, -32 + brth, 40, 5); 

            const earWave = Math.sin(this.frame * 0.08) * 4;
            ctx.fillStyle = tscD;
            ctx.fillRect(-32 - earWave, -30 + brth, 14, 22); 
            ctx.fillRect(18 + earWave, -30 + brth, 14, 22);  
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(-32 - earWave, -15 + brth, 14, 7);  

            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(12, -14 + brth, 6, 12);
            ctx.fillRect(-18, -14 + brth, 6, 12);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(14, -12 + brth, 2, 8);
            ctx.fillRect(-16, -12 + brth, 2, 8);

            ctx.fillStyle = 'black';
            ctx.fillRect(7, -24 + brth, 6, 6); ctx.fillRect(-13, -24 + brth, 6, 6);
            ctx.fillStyle = 'white';
            ctx.fillRect(10, -24 + brth, 2, 2); ctx.fillRect(-10, -24 + brth, 2, 2);

            ctx.save();
            ctx.fillStyle = tsc;
            let ang = this.direction === 'up' ? -1.3 : (this.direction === 'down' ? 1.3 : -0.2);
            ctx.translate(0, -12 + brth);
            ctx.rotate(ang);
            ctx.fillRect(0, -4, 20 + (this.trunkAnim * 25), 10);
            ctx.fillStyle = tscD;
            ctx.fillRect(18 + (this.trunkAnim * 25), -6, 5, 14);
            ctx.restore();

            if (this.hasShield) {
                ctx.strokeStyle = '#3fb950';
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 4]);
                ctx.lineDashOffset = -this.frame * 2;
                ctx.beginPath();
                ctx.arc(0, 0, 48, 0, Math.PI*2);
                ctx.stroke();
                ctx.fillStyle = 'rgba(63, 185, 80, 0.15)';
                ctx.fill();
            }
            ctx.restore();
        }
    };

    function createRow(y) {
        const types = ['grass', 'road', 'road', 'river', 'grass'];
        let type = types[Math.floor(Math.random() * types.length)];
        const row = {
            y: y, type: type, entities: [],
            speed: (Math.random() * 2 + 1.2) * (Math.random() > 0.5 ? 1 : -1),
            color: type === 'grass' ? '#0d1117' : (type === 'road' ? '#161b22' : '#0a192f'),
            deco: []
        };

        if (type === 'grass') {
            for(let i=0; i<8; i++) {
                row.deco.push({x: Math.random() * canvas.width, size: 2 + Math.random()*3, opacity: 0.1 + Math.random()*0.3});
            }
        }

        if (type === 'road') {
            for (let i = 0; i < 2; i++) row.entities.push({ 
                x: Math.random() * canvas.width, w: 110, h: 42, color: '#30363d' 
            });
        } else if (type === 'river') {
            row.speed *= 0.7;
            for (let i = 0; i < 3; i++) row.entities.push({ 
                x: Math.random() * canvas.width, w: 140, h: 46, color: '#4a3728' 
            });
        } else if (type === 'grass') {
            if (y < player.gridY - 4 && Math.random() > 0.65) {
                row.entities.push({ 
                    x: Math.random() * canvas.width, isBug: true, w: 44, h: 44, 
                    moveSpeed: (2.5 + Math.random() * 2), glow: 0 
                });
            }
            if (Math.random() > 0.94) items.push({ gridX: Math.floor(Math.random() * (canvas.width/gridSize)), gridY: y, type: 'shield' });
        }
        return row;
    }

    function checkCollision(title, text) {
        if (player.hasShield) return;
        
        gameActive = false;
        shakeAmount = 40;
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-text').innerText = text;
        messageBox.style.display = 'block';
    }

    function update() {
        if (!gameActive) return;
        player.update();
        
        targetCameraY = player.pixelY - canvas.height + gridSize * 3;
        cameraY += (targetCameraY - cameraY) * 0.08;
        
        if (shakeAmount > 0) shakeAmount *= 0.9;
        gcY -= gcSpeed;

        if (player.pixelY + 30 > gcY) checkCollision("MEMORY PURGE", "Gajah gagal menghindari pembersihan memori!");

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        bullets.forEach((b, i) => {
            if (b.dir === 'up') b.y -= b.speed; else if (b.dir === 'down') b.y += b.speed;
            else if (b.dir === 'left') b.x -= b.speed; else b.x += b.speed;
            b.life--;
            rows.forEach(row => {
                row.entities.forEach((ent, j) => {
                    if (ent.isBug) {
                        const ey = row.y * gridSize + (gridSize-ent.h)/2;
                        if (b.x > ent.x && b.x < ent.x + ent.w && b.y > ey && b.y < ey + ent.h) {
                            spawnParticles(ent.x + ent.w/2, ey + ent.h/2, '#ff4444', 20, 8);
                            row.entities.splice(j, 1);
                            bullets.splice(i, 1);
                            score += 150; scoreElement.innerText = score;
                        }
                    }
                });
            });
            if (b.life <= 0) bullets.splice(i, 1);
        });

        items.forEach((itm, i) => {
            if (player.gridX === itm.gridX && player.gridY === itm.gridY) {
                player.hasShield = true;
                player.shieldTime = 10000;
                shieldUi.classList.remove('hidden');
                spawnParticles(player.pixelX + gridSize/2, player.pixelY + gridSize/2, '#3fb950', 20, 5);
                items.splice(i, 1);
            }
        });

        // Flag untuk memastikan gajah hanya tergeser sekali per frame
        let shiftedByLog = false;
        
        rows.forEach(row => {
            row.entities.forEach(ent => {
                if (ent.isBug) {
                    ent.x += ent.moveSpeed; if (ent.x > canvas.width || ent.x < 0) ent.moveSpeed *= -1;
                    ent.glow = (Math.sin(Date.now()/200) + 1) / 2;
                } else {
                    ent.x += row.speed;
                    if (ent.x > canvas.width + 120) ent.x = -120; if (ent.x < -120) ent.x = canvas.width + 120;
                }
                const px = player.pixelX + 22; const py = player.pixelY + 22;
                const ey = row.y * gridSize + (gridSize-ent.h)/2;
                if ((row.type === 'road' || ent.isBug) && !player.isMoving) {
                    if (px < ent.x+ent.w && px+20 > ent.x && py < ey+ent.h && py+20 > ey) checkCollision("DATA LOSS", "Tabrakan paket data terdeteksi!");
                }
            });
            
            // Perbaikan: Hanya geser gajah SEKALI per frame meskipun ada banyak baris yang dicek
            if (!shiftedByLog && row.type === 'river' && Math.round(player.pixelY/gridSize) === row.y && !player.isMoving) {
                let safe = false;
                row.entities.forEach(log => {
                    if (player.pixelX+gridSize/2 > log.x && player.pixelX+gridSize/2 < log.x+log.w) {
                        safe = true; 
                        player.pixelX += row.speed; 
                        player.targetX = player.pixelX;
                        player.gridX = Math.round(player.pixelX/gridSize);
                        shiftedByLog = true; // Kunci agar tidak bergeser lagi di loop ini
                    }
                });
                
                if (!safe && !player.hasShield) checkCollision("SEGMENTATION FAULT", "Gajah jatuh ke dalam aliran memori!");
            }
        });

        if (Math.floor(player.pixelY/gridSize) < rows[rows.length-12].y) rows.push(createRow(rows[rows.length-1].y - 1));
    }

    function draw() {
        ctx.save();
        if (shakeAmount > 1) ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        rows.forEach(row => {
            const sy = row.y * gridSize - cameraY;
            if (sy < -gridSize * 2 || sy > canvas.height + gridSize) return;
            
            ctx.fillStyle = row.color; 
            ctx.fillRect(0, sy, canvas.width, gridSize);

            if (row.type === 'grass') {
                row.deco.forEach(d => {
                    ctx.fillStyle = `rgba(44, 241, 218, ${d.opacity})`;
                    ctx.fillRect(d.x, sy + gridSize/2, d.size, d.size);
                });
            }

            row.entities.forEach(ent => {
                const ey = sy + (gridSize-ent.h)/2;
                ctx.save();
                if (ent.isBug) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = `rgba(248, 81, 73, ${ent.glow})`;
                    ctx.fillStyle = '#f85149';
                    ctx.fillRect(ent.x, ey, ent.w, ent.h);
                    ctx.fillStyle = 'white';
                    ctx.fillRect(ent.x + 8, ey + 8, 6, 6);
                    ctx.fillRect(ent.x + ent.w - 14, ey + 8, 6, 6);
                } else {
                    ctx.fillStyle = ent.color;
                    ctx.fillRect(ent.x, ey, ent.w, ent.h);
                    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                    ctx.strokeRect(ent.x + 4, ey + 4, ent.w - 8, ent.h - 8);
                }
                ctx.restore();
            });
        });

        items.forEach(itm => {
            const iy = itm.gridY * gridSize - cameraY + gridSize/2;
            const float = Math.sin(Date.now()/250) * 8;
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#3fb950';
            ctx.font = "32px serif"; 
            ctx.fillText("🛡️", itm.gridX * gridSize + 15, iy + 10 + float);
        });

        const gsy = gcY - cameraY;
        const grad = ctx.createLinearGradient(0, gsy, 0, gsy + 400);
        grad.addColorStop(0, 'rgba(248, 81, 73, 0.45)');
        grad.addColorStop(1, 'rgba(248, 81, 73, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, gsy, canvas.width, 1000);
        ctx.fillStyle = '#f85149';
        ctx.fillRect(0, gsy - 4, canvas.width, 4);

        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y - cameraY, p.size, p.size);
        });
        ctx.globalAlpha = 1;

        bullets.forEach(b => { 
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'white';
            ctx.fillStyle = 'white'; 
            ctx.fillRect(b.x-4, b.y-cameraY-4, 8, 8);
        });

        player.draw(cameraY);
        ctx.restore();
        update();
        requestAnimationFrame(draw);
    }

    function resetGame() {
        maxDistance = 0; score = 0; scoreElement.innerText = score;
        gcSpeed = 0.22; player.init(); rows.length = 0; items.length = 0;
        for (let i = player.gridY + 10; i > -40; i--) rows.push(createRow(i));
        gameActive = true; messageBox.style.display = 'none';
    }

    const bind = (id, fn) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); fn(); });
        el.addEventListener('mousedown', (e) => { e.preventDefault(); fn(); });
    };

    bind('btn-up', () => player.move(0, -1));
    bind('btn-down', () => player.move(0, 1));
    bind('btn-left', () => player.move(-1, 0));
    bind('btn-right', () => player.move(1, 0));
    bind('btn-fire', () => player.shoot());

    window.addEventListener('keydown', e => {
        if (e.code === 'ArrowUp') player.move(0, -1);
        if (e.code === 'ArrowDown') player.move(0, 1);
        if (e.code === 'ArrowLeft') player.move(-1, 0);
        if (e.code === 'ArrowRight') player.move(1, 0);
        if (e.code === 'Space' || e.code === 'KeyF') player.shoot();
    });

    player.init();
    for (let i = player.gridY + 10; i > -40; i--) rows.push(createRow(i));
    window.onload = draw;
</script>
</body>
</html>
