<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yinbo Crossing - Power Up Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #05070a;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #080a0d;
            touch-action: none;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e6edf3;
            pointer-events: none;
            z-index: 10;
        }
        .stats-box {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid rgba(44, 241, 218, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            pointer-events: none;
            z-index: 50;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            gap: 8px;
            pointer-events: auto;
        }

        .ctrl-btn {
            background: rgba(48, 54, 61, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            transition: all 0.1s;
            box-shadow: 0 4px 0 rgba(0,0,0,0.5);
        }

        .ctrl-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.5);
            background: #2cf1da;
            color: #0d1117;
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }

        .btn-fire {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f85149 0%, #b62323 100%);
            border: 3px solid rgba(255, 255, 255, 0.2);
            font-size: 32px;
            box-shadow: 0 6px 0 #7a1510, 0 0 20px rgba(248, 81, 73, 0.3);
            pointer-events: auto;
        }
        
        .btn-fire:active {
            box-shadow: 0 2px 0 #7a1510;
            background: #ff7b72;
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 17, 23, 0.98);
            border: 2px solid #f85149;
            padding: 40px;
            text-align: center;
            color: white;
            border-radius: 24px;
            display: none;
            z-index: 100;
            width: 85%;
            max-width: 450px;
        }

        #message-box button {
            margin-top: 25px;
            padding: 16px;
            background: #238636;
            color: white;
            font-weight: 900;
            border-radius: 12px;
            width: 100%;
        }

        #audio-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }

        /* 2X Score Speed Effect Overlay */
        #speed-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(44, 241, 218, 0);
            transition: box-shadow 0.5s;
            z-index: 5;
        }
        .active-2x #speed-overlay {
            box-shadow: inset 0 0 150px rgba(44, 241, 218, 0.4);
            animation: pulse-vignette 1s infinite alternate;
        }
        @keyframes pulse-vignette {
            from { box-shadow: inset 0 0 100px rgba(44, 241, 218, 0.3); }
            to { box-shadow: inset 0 0 200px rgba(44, 241, 218, 0.5); }
        }
    </style>
</head>
<body id="game-body">

    <div id="speed-overlay"></div>

    <div id="ui-overlay">
        <div class="stats-box">
            <div class="text-[10px] uppercase tracking-[0.3em] text-teal-400 font-bold mb-1">DATA RECOVERED</div>
            <div class="text-4xl font-black italic text-white drop-shadow-lg"><span id="score">0</span></div>
            <div class="text-[10px] text-gray-400 mt-1 uppercase">Highscore: <span id="highscore">0</span></div>
            
            <div id="status-container" class="mt-2 flex flex-col gap-1">
                <div id="shield-ui" class="hidden text-[10px] text-green-400 font-bold flex items-center gap-1">
                    <span class="animate-pulse">●</span> SHIELD_PROTOCOL: ACTIVE (<span id="shield-timer">5</span>s)
                </div>
                <div id="2x-ui" class="hidden text-[10px] text-yellow-400 font-bold flex items-center gap-1">
                    <span class="animate-bounce">★</span> 2X_SCORE_MULTIPLIER: ON (<span id="2x-timer">20</span>s)
                </div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="audio-hint">Press any key to start Audio</div>

    <div class="mobile-controls">
        <div class="dpad">
            <div id="btn-up" class="ctrl-btn btn-up">▲</div>
            <div id="btn-left" class="ctrl-btn btn-left">◀</div>
            <div id="btn-right" class="ctrl-btn btn-right">▶</div>
            <div id="btn-down" class="ctrl-btn btn-down">▼</div>
        </div>
        <div class="action-zone">
            <div id="btn-fire" class="ctrl-btn btn-fire">⚡</div>
        </div>
    </div>

    <div id="message-box">
        <div class="text-7xl mb-6">🐘</div>
        <h2 id="msg-title" class="text-3xl font-black mb-2 text-red-500">SYSTEM CRASH</h2>
        <p id="msg-text" class="text-gray-400 font-mono text-sm leading-relaxed"></p>
        <button onclick="resetGame()">REBOOT SYSTEM</button>
    </div>

<script>
    /** --- AUDIO ENGINE (Synthesized 16-bit sound) --- **/
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let musicStarted = false;

    function playTone(freq, type, duration, volume, slide = 0) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slide !== 0) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        jump: () => playTone(150, 'triangle', 0.2, 0.2, 400),
        shoot: () => playTone(800, 'square', 0.1, 0.1, 100),
        die: () => {
            playTone(200, 'sawtooth', 0.5, 0.3, 20);
            playTone(50, 'sine', 0.5, 0.5, 10);
        },
        item: () => {
            playTone(400, 'sine', 0.1, 0.2, 800);
            setTimeout(() => playTone(600, 'sine', 0.1, 0.2, 1200), 50);
        },
        hit: () => playTone(60, 'square', 0.2, 0.3, 30),
        rocket: () => playTone(100, 'sawtooth', 1.5, 0.3, 800)
    };

    // Music Generator
    const melodies = [
        [261.63, 293.66, 329.63, 349.23, 392.00], 
        [329.63, 392.00, 440.00, 523.25]
    ];
    let musicTick = 0;
    function playMusic() {
        if (!gameActive) return;
        const tempo = 150; 
        if (musicTick % 4 === 0) {
            playTone(musicTick % 16 < 8 ? 65.41 : 49.00, 'triangle', 0.3, 0.1);
        }
        if (musicTick % 8 === 0) {
            playTone(100, 'sine', 0.1, 0.4, 10);
        }
        if (musicTick % 8 === 4) {
            const noise = audioCtx.createOscillator();
            const ng = audioCtx.createGain();
            noise.type = 'square';
            noise.frequency.setValueAtTime(Math.random() * 1000 + 500, audioCtx.currentTime);
            ng.gain.setValueAtTime(0.05, audioCtx.currentTime);
            ng.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            noise.connect(ng); ng.connect(audioCtx.destination);
            noise.start(); noise.stop(audioCtx.currentTime + 0.05);
        }
        if (Math.random() > 0.8) {
            const scale = melodies[0];
            const note = scale[Math.floor(Math.random() * scale.length)];
            playTone(note, 'sine', 0.4, 0.05);
        }
        musicTick++;
        setTimeout(playMusic, tempo);
    }

    function startAudioOnInteraction() {
        if (!musicStarted) {
            musicStarted = true;
            audioCtx.resume();
            playMusic();
            document.getElementById('audio-hint').style.display = 'none';
        }
    }

    /** --- GAME ENGINE --- **/
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const highscoreElement = document.getElementById('highscore');
    const messageBox = document.getElementById('message-box');
    const shieldUi = document.getElementById('shield-ui');
    const shieldTimerDisplay = document.getElementById('shield-timer');
    const doubleUi = document.getElementById('2x-ui');
    const doubleTimerDisplay = document.getElementById('2x-timer');
    const gameBody = document.getElementById('game-body');

    const gridSize = 64;
    let gameActive = true;
    let score = 0;
    let bonusScore = 0; 
    let highscore = localStorage.getItem('elephant_highscore') || 0;
    highscoreElement.innerText = highscore;
    
    let maxDistance = 0;
    let cameraY = 0;
    let targetCameraY = 0;
    let shakeAmount = 0;
    let gcY = 0;
    let gcSpeed = 0.22; 
    let startGridY = 0;

    const particles = [];
    const bullets = [];
    const items = [];
    let rows = [];
    
    function spawnParticles(x, y, color, count = 10, speed = 5) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * speed,
                vy: (Math.random() - 0.5) * speed,
                life: 1,
                decay: 0.02 + Math.random() * 0.03,
                color,
                size: 2 + Math.random() * 4
            });
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function updateScoreDisplay() {
        let mult = player.isDoubleScore ? 2 : 1;
        score = ((maxDistance * 10) + bonusScore) * mult;
        scoreElement.innerText = score;
        if (score > highscore) {
            highscore = score;
            highscoreElement.innerText = highscore;
            localStorage.setItem('elephant_highscore', highscore);
        }
    }

    const player = {
        gridX: 0, gridY: 0, pixelX: 0, pixelY: 0, targetX: 0, targetY: 0,
        isMoving: false, direction: 'up', jumpAnim: 0, 
        hasShield: false, shieldTime: 0,
        isDoubleScore: false, doubleTime: 0,
        isRocketing: false, rocketDist: 0,
        frame: 0, trunkAnim: 0,
        
        init() {
            this.gridX = Math.floor(canvas.width / 2 / gridSize);
            this.gridY = Math.floor(canvas.height / gridSize) - 2;
            startGridY = this.gridY; 
            this.targetX = this.gridX * gridSize;
            this.targetY = this.gridY * gridSize;
            this.pixelX = this.targetX;
            this.pixelY = this.targetY;
            this.hasShield = false;
            this.shieldTime = 0;
            this.isDoubleScore = false;
            this.doubleTime = 0;
            this.isRocketing = false;
            this.rocketDist = 0;
            this.trunkAnim = 0;
            shieldUi.classList.add('hidden');
            doubleUi.classList.add('hidden');
            gameBody.classList.remove('active-2x');
            gcY = (this.gridY + 10) * gridSize; 
            cameraY = this.pixelY - canvas.height + gridSize * 3;
            targetCameraY = cameraY;
        },

        move(dx, dy) {
            if (this.isMoving || !gameActive || this.isRocketing) return;
            startAudioOnInteraction();
            this.gridX += dx; this.gridY += dy;
            this.targetX = this.gridX * gridSize;
            this.targetY = this.gridY * gridSize;
            this.isMoving = true;
            this.jumpAnim = 0;
            if (dx > 0) this.direction = 'right';
            if (dx < 0) this.direction = 'left';
            if (dy < 0) this.direction = 'up';
            if (dy > 0) this.direction = 'down';
            
            sfx.jump();
            spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize/2, '#2cf1da', 5, 2);

            let currentDist = startGridY - this.gridY;
            if (currentDist > maxDistance) {
                maxDistance = currentDist;
                updateScoreDisplay();
                gcSpeed = 0.22 + (score / 4500);
            }
        },

        shoot() {
            if (!gameActive || this.isRocketing) return;
            startAudioOnInteraction();
            this.trunkAnim = 1.0;
            sfx.shoot();
            bullets.push({
                x: this.pixelX + gridSize/2, y: this.pixelY + gridSize/2,
                dir: this.direction, speed: 14, life: 60
            });
            spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize/2, '#ffffff', 8, 4);
            shakeAmount = 4;
        },

        activateRocket() {
            this.isRocketing = true;
            this.rocketDist = 15; // Jumlah baris yang dilompati
            sfx.rocket();
            this.hasShield = true; // Kebal saat ngeroket
            this.shieldTime = Math.max(this.shieldTime, 2000);
        },

        update() {
            if (this.isRocketing) {
                this.gridY -= 0.5;
                this.targetY = this.gridY * gridSize;
                this.pixelY = this.targetY;
                this.rocketDist -= 0.5;
                
                // Efek api roket
                spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize, '#f85149', 2, 3);
                spawnParticles(this.pixelX + gridSize/2, this.pixelY + gridSize, '#ff7b72', 1, 2);
                shakeAmount = 5;

                if (this.rocketDist <= 0) {
                    this.isRocketing = false;
                    this.gridY = Math.round(this.gridY);
                    this.targetY = this.gridY * gridSize;
                    bonusScore += 100;
                    updateScoreDisplay();
                }
            }

            this.pixelX += (this.targetX - this.pixelX) * 0.25;
            this.pixelY += (this.targetY - this.pixelY) * 0.25;
            if (this.isMoving) {
                this.jumpAnim += 0.35;
                if (this.jumpAnim >= Math.PI) { this.jumpAnim = 0; this.isMoving = false; }
            }
            if (this.trunkAnim > 0) this.trunkAnim -= 0.12;
            
            if (this.hasShield) {
                this.shieldTime -= 16.67; 
                shieldTimerDisplay.innerText = Math.max(0, Math.ceil(this.shieldTime / 1000));
                if (this.shieldTime <= 0) {
                    this.hasShield = false;
                    shieldUi.classList.add('hidden');
                }
            }

            if (this.isDoubleScore) {
                this.doubleTime -= 16.67;
                doubleTimerDisplay.innerText = Math.max(0, Math.ceil(this.doubleTime / 1000));
                if (this.doubleTime <= 0) {
                    this.isDoubleScore = false;
                    doubleUi.classList.add('hidden');
                    gameBody.classList.remove('active-2x');
                    updateScoreDisplay();
                }
            }
            
            this.frame++;
        },

        draw(camY) {
            const jumpH = Math.sin(this.jumpAnim) * 24;
            const dx = this.pixelX + gridSize/2;
            const dy = this.pixelY + gridSize/2 - camY - jumpH;

            ctx.save();
            ctx.translate(dx, dy);

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 26 + jumpH/2, 24 - jumpH/4, 8 - jumpH/8, 0, 0, Math.PI*2);
            ctx.fill();

            const tsc = '#2cf1da';
            const tscD = '#1ebca9';
            const tscL = '#61ffed';
            const brth = Math.sin(this.frame * 0.1) * 2;

            if (this.direction === 'left') ctx.scale(-1, 1);

            // Legs
            ctx.fillStyle = '#0f6359';
            ctx.fillRect(-15, 10, 8, 16); 
            ctx.fillRect(7, 10, 8, 16);
            
            // Body
            ctx.fillStyle = tscD;
            ctx.fillRect(-22, -12 + brth, 44, 28); 
            ctx.fillStyle = tsc;
            ctx.fillRect(-22, -12 + brth, 44, 22); 
            ctx.fillStyle = tscL;
            ctx.fillRect(-22, -12 + brth, 44, 6);  

            ctx.fillStyle = '#147a6e';
            ctx.fillRect(-10, 12, 9, 14); 
            ctx.fillRect(1, 12, 9, 14);

            // Head
            ctx.fillStyle = tsc;
            ctx.fillRect(-20, -32 + brth, 40, 24);
            ctx.fillStyle = tscL;
            ctx.fillRect(-20, -32 + brth, 40, 5); 

            // Ears
            const earWave = Math.sin(this.frame * 0.08) * 4;
            ctx.fillStyle = tscD;
            ctx.fillRect(-32 - earWave, -30 + brth, 14, 22); 
            ctx.fillRect(18 + earWave, -30 + brth, 14, 22);  
            
            // Tusks
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(12, -14 + brth, 6, 12);
            ctx.fillRect(-18, -14 + brth, 6, 12);

            // Eyes
            ctx.fillStyle = 'black';
            ctx.fillRect(7, -24 + brth, 6, 6); ctx.fillRect(-13, -24 + brth, 6, 6);
            ctx.fillStyle = 'white';
            ctx.fillRect(10, -24 + brth, 2, 2); ctx.fillRect(-10, -24 + brth, 2, 2);

            // Trunk
            ctx.save();
            ctx.fillStyle = tsc;
            let ang = this.direction === 'up' ? -1.3 : (this.direction === 'down' ? 1.3 : -0.2);
            ctx.translate(0, -10 + brth); 
            ctx.rotate(ang);
            ctx.fillRect(0, -4, 20 + (this.trunkAnim * 25), 10);
            ctx.restore();

            // Rocket Booster Visual
            if (this.isRocketing) {
                ctx.fillStyle = '#f85149';
                ctx.fillRect(-10, 20, 20, 15);
                ctx.fillStyle = '#ff7b72';
                ctx.fillRect(-5, 35, 10, 10 + Math.random()*15);
            }

            if (this.hasShield) {
                ctx.strokeStyle = '#3fb950';
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 4]);
                ctx.lineDashOffset = -this.frame * 2;
                ctx.beginPath();
                ctx.arc(0, 0, 48, 0, Math.PI*2);
                ctx.stroke();
            }
            ctx.restore();
        }
    };

    function createRow(y, forceType = null) {
        const types = ['grass', 'road', 'road', 'river', 'grass'];
        let type = forceType || types[Math.floor(Math.random() * types.length)];
        const row = {
            y: y, type: type, entities: [],
            speed: (Math.random() * 2 + 1.2) * (Math.random() > 0.5 ? 1 : -1),
            color: type === 'grass' ? '#0d1117' : (type === 'road' ? '#161b22' : '#440a0a'),
            deco: []
        };

        if (type === 'grass') {
            for(let i=0; i<8; i++) {
                row.deco.push({x: Math.random() * canvas.width, size: 2 + Math.random()*3, opacity: 0.1 + Math.random()*0.3});
            }
        }

        if (type === 'road') {
            for (let i = 0; i < 2; i++) row.entities.push({ 
                x: Math.random() * canvas.width, w: 110, h: 42, color: '#3fb950' 
            });
        } else if (type === 'river') {
            row.speed *= 0.7;
            for (let i = 0; i < 3; i++) row.entities.push({ 
                x: Math.random() * canvas.width, w: 140, h: 46, color: 'rgba(0, 255, 255, 0.2)' 
            });
        } else if (type === 'grass') {
            if (y < player.gridY - 4 && Math.random() > 0.65) {
                row.entities.push({ 
                    x: Math.random() * canvas.width, isBug: true, w: 44, h: 44, 
                    moveSpeed: (2.5 + Math.random() * 2), glow: 0 
                });
            }
            
            // Item Spawning (Reduced Shield, Added 2X and Rocket)
            if (Math.random() > 0.95) {
                let r = Math.random();
                let itmX = Math.floor(Math.random() * (canvas.width/gridSize));
                if (r < 0.3) items.push({ gridX: itmX, gridY: y, type: 'shield' });
                else if (r < 0.7) items.push({ gridX: itmX, gridY: y, type: 'double' });
                else items.push({ gridX: itmX, gridY: y, type: 'rocket' });
            }
        }
        return row;
    }

    function checkCollision(title, text) {
        if (player.hasShield || player.isRocketing) return;
        gameActive = false;
        sfx.die();
        shakeAmount = 40;
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-text').innerText = text;
        messageBox.style.display = 'block';
    }

    function initMap() {
        rows = [];
        items.length = 0;
        for (let i = player.gridY + 10; i > -40; i--) {
            let type = null;
            if (i >= player.gridY - 1 && i <= player.gridY + 1) type = 'grass';
            rows.push(createRow(i, type));
        }
    }

    function update() {
        if (!gameActive) return;
        player.update();
        
        targetCameraY = player.pixelY - canvas.height + gridSize * 3;
        cameraY += (targetCameraY - cameraY) * 0.08;
        
        if (shakeAmount > 0) shakeAmount *= 0.9;
        gcY -= gcSpeed;

        if (player.pixelY + 30 > gcY) checkCollision("MEMORY PURGE", "Elephant failed to avoid the memory sweep!");

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        bullets.forEach((b, i) => {
            if (b.dir === 'up') b.y -= b.speed; else if (b.dir === 'down') b.y += b.speed;
            else if (b.dir === 'left') b.x -= b.speed; else b.x += b.speed;
            b.life--;
            rows.forEach(row => {
                row.entities.forEach((ent, j) => {
                    if (ent.isBug) {
                        const ey = row.y * gridSize + (gridSize-ent.h)/2;
                        if (b.x > ent.x && b.x < ent.x + ent.w && b.y > ey && b.y < ey + ent.h) {
                            sfx.hit();
                            spawnParticles(ent.x + ent.w/2, ey + ent.h/2, '#ff4444', 20, 8);
                            row.entities.splice(j, 1);
                            bullets.splice(i, 1);
                            bonusScore += 150; 
                            updateScoreDisplay();
                        }
                    }
                });
            });
            if (b.life <= 0) bullets.splice(i, 1);
        });

        items.forEach((itm, i) => {
            if (player.gridX === itm.gridX && Math.round(player.gridY) === itm.gridY) {
                sfx.item();
                if (itm.type === 'shield') {
                    player.hasShield = true;
                    player.shieldTime = 5000;
                    shieldUi.classList.remove('hidden');
                } else if (itm.type === 'double') {
                    player.isDoubleScore = true;
                    player.doubleTime = 20000;
                    doubleUi.classList.remove('hidden');
                    gameBody.classList.add('active-2x');
                    updateScoreDisplay();
                } else if (itm.type === 'rocket') {
                    player.activateRocket();
                }
                spawnParticles(player.pixelX + gridSize/2, player.pixelY + gridSize/2, '#ffffff', 20, 5);
                items.splice(i, 1);
            }
        });

        let shiftedByLog = false;
        rows.forEach(row => {
            row.entities.forEach(ent => {
                if (ent.isBug) {
                    ent.x += ent.moveSpeed; if (ent.x > canvas.width || ent.x < 0) ent.moveSpeed *= -1;
                    ent.glow = (Math.sin(Date.now()/200) + 1) / 2;
                } else {
                    ent.x += row.speed;
                    if (ent.x > canvas.width + 120) ent.x = -120; if (ent.x < -120) ent.x = canvas.width + 120;
                }
                const px = player.pixelX + 22; const py = player.pixelY + 22;
                const ey = row.y * gridSize + (gridSize-ent.h)/2;
                if ((row.type === 'road' || ent.isBug) && !player.isMoving && !player.isRocketing) {
                    if (px < ent.x+ent.w && px+20 > ent.x && py < ey+ent.h && py+20 > ey) checkCollision("DATA LOSS", "Data packet collision detected!");
                }
            });
            
            if (!shiftedByLog && row.type === 'river' && Math.round(player.pixelY/gridSize) === row.y && !player.isMoving && !player.isRocketing) {
                let safe = false;
                for(let log of row.entities) {
                    if (player.pixelX+gridSize/2 > log.x && player.pixelX+gridSize/2 < log.x+log.w) {
                        safe = true; 
                        player.pixelX += row.speed; 
                        player.targetX = player.pixelX;
                        player.gridX = Math.round(player.pixelX/gridSize);
                        shiftedByLog = true;
                        break;
                    }
                }
                if (!safe && !player.hasShield) checkCollision("SEGMENTATION FAULT", "Elephant fell into the memory stream!");
            }
        });

        if (Math.floor(player.pixelY/gridSize) < rows[rows.length-12].y) rows.push(createRow(rows[rows.length-1].y - 1));
    }

    function draw() {
        ctx.save();
        if (shakeAmount > 1) ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        rows.forEach(row => {
            const sy = row.y * gridSize - cameraY;
            if (sy < -gridSize * 2 || sy > canvas.height + gridSize) return;
            
            ctx.fillStyle = row.color; 
            ctx.fillRect(0, sy, canvas.width, gridSize);

            if (row.type === 'river') {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
                ctx.font = '10px monospace';
                for(let i=0; i<canvas.width; i+=40) {
                    const char = Math.random() > 0.5 ? '1' : '0';
                    ctx.fillText(char, (i + Date.now()/20) % canvas.width, sy + 15 + (i%30));
                }
            }

            if (row.type === 'grass') {
                row.deco.forEach(d => {
                    ctx.fillStyle = `rgba(44, 241, 218, ${d.opacity})`;
                    ctx.fillRect(d.x, sy + gridSize/2, d.size, d.size);
                });
            }

            row.entities.forEach(ent => {
                const ey = sy + (gridSize-ent.h)/2;
                ctx.save();
                if (ent.isBug) {
                    const p = Math.floor(ent.w / 11); 
                    const bugX = ent.x; const bugY = ey;
                    const isAlt = Math.floor(Date.now() / 300) % 2 === 0;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = `rgba(248, 81, 73, ${ent.glow})`;
                    ctx.fillStyle = '#f85149';
                    const drawPix = (x, y) => ctx.fillRect(bugX + x*p, bugY + y*p, p, p);
                    drawPix(2,0); drawPix(8,0); drawPix(3,1); drawPix(7,1);
                    for(let i=2; i<=8; i++) drawPix(i,2);
                    for(let i=1; i<=3; i++) drawPix(i,3); for(let i=7; i<=9; i++) drawPix(i,3);
                    for(let i=0; i<=10; i++) drawPix(i,4);
                    if (isAlt) {
                        drawPix(0,5); drawPix(10,5); drawPix(0,6); drawPix(2,6); drawPix(8,6); drawPix(10,6);
                        drawPix(3,7); drawPix(4,7); drawPix(6,7); drawPix(7,7); for(let i=2; i<=8; i++) drawPix(i,5);
                    } else {
                        for(let i=2; i<=8; i++) drawPix(i,5); drawPix(0,5); drawPix(10,5); drawPix(1,6); drawPix(9,6);
                        drawPix(0,7); drawPix(2,7); drawPix(8,7); drawPix(10,7);
                    }
                    ctx.fillStyle = 'white';
                    ctx.fillRect(bugX + 3*p, bugY + 3*p, p, p); ctx.fillRect(bugX + 7*p, bugY + 3*p, p, p);
                    
                } else if (row.type === 'road') {
                    ctx.fillStyle = ent.color;
                    ctx.shadowBlur = 10; ctx.shadowColor = '#3fb950';
                    ctx.fillRect(ent.x, ey, ent.w, ent.h);
                } else if (row.type === 'river') {
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.15)';
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                    ctx.lineWidth = 2;
                    ctx.fillRect(ent.x, ey, ent.w, ent.h);
                    ctx.strokeRect(ent.x, ey, ent.w, ent.h);
                }
                ctx.restore();
            });
        });

        items.forEach(itm => {
            const iy = itm.gridY * gridSize - cameraY + gridSize/2;
            const float = Math.sin(Date.now()/250) * 8;
            ctx.shadowBlur = 12;
            ctx.font = "32px serif"; 
            let emoji = "🛡️";
            if (itm.type === 'double') { emoji = "⭐"; ctx.shadowColor = "#e3b341"; }
            else if (itm.type === 'rocket') { emoji = "🚀"; ctx.shadowColor = "#f85149"; }
            else { ctx.shadowColor = "#3fb950"; }
            ctx.fillText(emoji, itm.gridX * gridSize + 15, iy + 10 + float);
        });

        const gsy = gcY - cameraY;
        const grad = ctx.createLinearGradient(0, gsy, 0, gsy + 400);
        grad.addColorStop(0, 'rgba(248, 81, 73, 0.45)');
        grad.addColorStop(1, 'rgba(248, 81, 73, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, gsy, canvas.width, 1000);
        ctx.fillStyle = '#f85149';
        ctx.fillRect(0, gsy - 4, canvas.width, 4);

        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y - cameraY, p.size, p.size);
        });
        ctx.globalAlpha = 1;

        bullets.forEach(b => { 
            ctx.shadowBlur = 10; ctx.shadowColor = 'white';
            ctx.fillStyle = 'white'; ctx.fillRect(b.x-4, b.y-cameraY-4, 8, 8);
        });

        player.draw(cameraY);
        ctx.restore();
        update();
        requestAnimationFrame(draw);
    }

    function resetGame() {
        maxDistance = 0; score = 0; bonusScore = 0;
        scoreElement.innerText = score;
        gcSpeed = 0.22; player.init(); 
        initMap();
        gameActive = true; messageBox.style.display = 'none';
        if (musicStarted) playMusic();
    }

    const bind = (id, fn) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); fn(); });
        el.addEventListener('mousedown', (e) => { e.preventDefault(); fn(); });
    };

    bind('btn-up', () => player.move(0, -1));
    bind('btn-down', () => player.move(0, 1));
    bind('btn-left', () => player.move(-1, 0));
    bind('btn-right', () => player.move(1, 0));
    bind('btn-fire', () => player.shoot());

    window.addEventListener('keydown', e => {
        if (e.code === 'ArrowUp' || e.code === 'KeyW') player.move(0, -1);
        if (e.code === 'ArrowDown' || e.code === 'KeyS') player.move(0, 1);
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') player.move(-1, 0);
        if (e.code === 'ArrowRight' || e.code === 'KeyD') player.move(1, 0);
        if (e.code === 'Space' || e.code === 'KeyF') player.shoot();
    });

    player.init();
    initMap();
    window.onload = draw;
</script>
</body>
</html>
